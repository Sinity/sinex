# AST-grep rules for converting property tests to use builders

rules:
  # Rule 1: Convert create_raw_event calls
  - id: convert-create-raw-event
    pattern: |
      crate::common::events::create_raw_event($SOURCE, $EVENT_TYPE, $PAYLOAD, $TIMESTAMP)
    fix: |
      TestEventBuilder::new()
          .source($SOURCE)
          .event_type($EVENT_TYPE)
          .payload($PAYLOAD)
          .timestamp($TIMESTAMP)
          .build()

  # Rule 2: Convert manual RawEvent construction
  - id: convert-raw-event-struct
    pattern: |
      RawEvent {
        id: $ID,
        source: $SOURCE,
        event_type: $EVENT_TYPE,
        payload: $PAYLOAD,
        ts_orig: $TS_ORIG,
        ts_ingest: $TS_INGEST,
        ts_export: $TS_EXPORT,
        $$$REST
      }
    fix: |
      TestEventBuilder::new()
          .source($SOURCE)
          .event_type(&$EVENT_TYPE)
          .payload($PAYLOAD)
          .timestamp($TS_ORIG.unwrap_or_else(|| chrono::Utc::now()))
          .build()

  # Rule 3: Convert event generation strategies
  - id: convert-event-strategy
    pattern: |
      (event_sources(), event_types(), event_payloads())
        .prop_map($CLOSURE)
    fix: |
      arbitrary_event()

  # Rule 4: Convert filesystem event patterns
  - id: convert-filesystem-events
    pattern: |
      event_type: $EVENT_TYPE,
    has:
      any:
        - pattern: "file.created"
        - pattern: "file.modified"
        - pattern: "file.deleted"
        - pattern: "dir.created"
        - pattern: "dir.deleted"
    fix: |
      filesystem_event()

  # Rule 5: Add property builders import
  - id: add-property-builders-import
    pattern: |
      use crate::common::$$$;
    inside:
      kind: use_declaration
    fix: |
      use crate::common::property_builders::*;
      use crate::common::$$$;