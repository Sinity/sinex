# rust-analyzer configuration for the sinex workspace.
#
# Why this file exists: Claude Code's LSP harness spawns its own
# rust-analyzer per session and ignores editor-level configs (the VSCode
# `rust-analyzer.*` settings in dots/vscode/User/settings.json don't reach
# it). Without this file, claude's RA runs on pure defaults over a
# 350K-line workspace and grows to 8+ GB RSS within a session.
#
# Investigation: .agent/scratch/ra-integration-investigation-2026-05-11.md
#
# Expected impact (cold session): ~3-4 GB peak, ~2-3 GB steady, capped
# growth over long sessions via lru.capacity below. Observed pre-cap
# growth was 7.8 GB after a 4 h Wave-B fold session.
#
# Verify after the next RA spawn:
#   ps -o pid,rss,vsz,command -p $(pgrep -f 'rust-analyzer')

# ── Worker threads ──
# Top-level key (NOT a [numThreads] table). Default is CPU count
# (24 on this host) which means concurrent indexing of all crates
# at cold-start, each holding intermediate state. 6 is enough to
# saturate I/O of cargo metadata + file reads without piling on
# memory peaks. Tradeoff: cold-start ~2x slower; once warm, no
# difference.
numThreads = 6

[cargo]
# Don't analyze every target (dev-deps, examples, benchmarks); analyze
# only the default target tree. Big workspaces with rich dev-dep graphs
# (xtask::sandbox, proptest, etc.) blow up the Salsa working set
# otherwise.
allTargets = false

# Default to the main check target. Setting this true would extend the
# rebuild graph to all binaries on every save — punishing in a 14-member
# workspace.
buildScripts.enable = true

[cachePriming]
# Don't aggressively walk the workspace on startup priming the cache.
# We accept slower first-hover latency in exchange for not blowing the
# memory ceiling during session startup.
enable = false

[check]
# Don't run `cargo check --workspace` on every save — match what
# `xtask check` does (scoped, targeted). The workspace check stays
# behind explicit invocation.
workspace = false

# Don't override --target-dir: cargo's target dir is set by the devshell
# to $SINEX_DEV_CACHE_ROOT/target (resolves to /cache/sinex/<hash>/target).
# Letting RA share that dir with xtask trades a theoretical lockfile race
# for warm-cache reuse. Isolating would force RA to compile every dep
# from scratch into a separate dir — punishing in a 350K-LOC workspace
# with a 124 GB+ artifact set. The lockfile contention is handled by
# cargo's own per-target locking.

[files]
# Exclude everything that isn't source. The whole .sinex/ tree (target,
# state, test-pgdata, run, snapshots, test-artifacts, test-tmp, tls) is
# generated artifacts or runtime state — RA has no business indexing
# any of it. Likewise /cache and result symlinks.
excludeDirs = [
    ".sinex",
    "target",
    ".direnv",
    "result",
    "result-*",
]

[lru]
# Cap Salsa's per-crate memo table at 1024 entries. With RA's default
# (unbounded) the table grows monotonically over the session — on a
# 4 h Wave-B fold session this RA hit 7.8 GB RSS even though the
# workspace itself shrank from 20 → 14 crates. Bounding the LRU caps
# memo state at ~1-2 GB; combined with the crate graph + proc-macro
# server the total stays under ~3-4 GB.
#
# Tradeoff: hover/completion on an LRU-evicted symbol triggers a
# re-analysis → 200-500ms cold-cache delay. Acceptable for Claude
# flows where hovers are infrequent and bursty.
capacity = 1024

[procMacro]
# Keep proc-macro expansion ON (we need #[derive(EventPayload)],
# #[derive(SourceRecord)], sqlx::query!, etc. to expand for type info).
# But don't expand attribute proc-macros that aren't needed for typing
# (e.g. #[tracing::instrument]).
enable = true
attributes.enable = false

# Skip macros that add no type info but cost memo entries. These are
# pure side-effect or telemetry wrappers — their expansion changes
# nothing RA can use for completion or go-to-def. Tradeoff: hover on
# a `#[tracing::instrument]`-wrapped fn shows the unwrapped signature
# (which is what you wanted anyway).
ignored.tracing = ["instrument"]
ignored.tokio = ["main", "test"]

[diagnostics]
# Disable Cargo's slow type-checker for non-edited files; let RA's own
# semantic analysis handle most checks. Cuts the rebuild blast radius
# during incremental edits.
disabled = ["unresolved-proc-macro"]
