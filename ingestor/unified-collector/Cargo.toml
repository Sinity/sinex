[package]
name = "unified-collector"
version = "0.1.0"
edition = "2021"

[lib]
name = "unified_collector"
path = "src/lib.rs"

[[bin]]
name = "unified-collector"
path = "src/main.rs"

[dependencies]
sinex-core = { path = "../../crate/sinex-core" }
sinex-events = { path = "../../crate/sinex-events" }
sinex-shared = { path = "../shared" }
sinex-db = { path = "../../crate/sinex-db" }

anyhow = "1.0"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.4", features = ["derive", "env"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
futures = "0.3"
notify = "6.1"
uuid = { version = "1.6", features = ["v4", "serde"] }