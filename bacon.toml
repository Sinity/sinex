# Bacon configuration for Sinex

default_job = "smart"

[jobs]
# Smart check - only checks crates with changes
[jobs.smart]
command = ["./scripts/smart-check.sh"]
need_stdout = true

# Full workspace check (when you want to see all errors)
[jobs.check-all]
command = ["cargo", "check", "--workspace", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy", "--workspace", "--all-targets", "--color", "always", "--", "-W", "clippy::all"]
need_stdout = false

[jobs.test]
command = ["cargo", "nextest", "run", "--color", "always"]
need_stdout = true

[jobs.doc]
command = ["cargo", "doc", "--workspace", "--all-features", "--color", "always"]
need_stdout = false

# Check specific crate
[jobs.crate]
command = ["cargo", "check", "-p", "$CARGO_CRATE", "--color", "always"]
need_stdout = false

# Watch patterns
[watch]
paths = ["src", "tests", "Cargo.toml", "build.rs"]
ignore_patterns = ["target/", "*.bak", "*.swp"]