# Bacon configuration for Sinex - blazingly fast with cranelift

# Global settings
summary = true     # Start with summary toggled on
wrap = true        # Wrap long lines
reverse = true     # Show most recent output first

# Default job - ultra-fast check with cranelift and all targets
[jobs.check]
command = ["cargo", "check", "--workspace", "--all-targets", "--color", "always"]
need_stdout = false
on_change_strategy = "kill_then_restart"  # Fast feedback for type checking
env.RUSTFLAGS = "-Z codegen-backend=cranelift -C link-arg=-fuse-ld=mold -C codegen-units=16 -Z share-generics=y -Z threads=0"

# Auto-testing job - runs tests automatically on file changes
[jobs.auto-test]
command = ["cargo", "nextest", "run", "--workspace", "--color", "always"]
need_stdout = true
on_change_strategy = "wait_then_restart"  # Let tests complete
watch = ["src", "tests", "Cargo.toml", "Cargo.lock"]
env.RUSTFLAGS = "-Z codegen-backend=cranelift -C link-arg=-fuse-ld=mold -C codegen-units=16 -Z share-generics=y -Z threads=0"

# Clippy job - more thorough linting with cranelift
[jobs.clippy]
command = ["cargo", "clippy", "--workspace", "--all-targets", "--color", "always", "--", "-D", "warnings"]
need_stdout = false
on_change_strategy = "kill_then_restart"  # Fast feedback for linting
env.RUSTFLAGS = "-Z codegen-backend=cranelift -C link-arg=-fuse-ld=mold -C codegen-units=16 -Z share-generics=y -Z threads=0"

# Manual test job - for when you want to run tests explicitly
[jobs.test]
command = ["cargo", "nextest", "run", "--workspace", "--color", "always"]
need_stdout = true
on_change_strategy = "wait_then_restart"  # Let tests complete
env.RUSTFLAGS = "-Z codegen-backend=cranelift -C link-arg=-fuse-ld=mold -C codegen-units=16 -Z share-generics=y -Z threads=0"

# Documentation
[jobs.doc]
command = ["cargo", "doc", "--workspace", "--no-deps", "--color", "always"]
need_stdout = false
env.RUSTFLAGS = "-Z codegen-backend=cranelift -C link-arg=-fuse-ld=mold -C codegen-units=16 -Z share-generics=y -Z threads=0"

# Keybindings - avoid only actual conflicts (q, ESC, Tab)
[keybindings]
# Switch between jobs
c = "job:check"
t = "job:test"
a = "job:auto-test"  # Auto-testing job
l = "job:clippy"
d = "job:doc"
# Other actions
s = "toggle-summary"
g = "toggle-backtrace"
h = "help"
# Removed 'q' - let tmux handle it for detaching
# Removed 'ESC' - conflicts with mprocs focus switching