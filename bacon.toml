# Bacon configuration for Sinex

# Default job - continuous compilation checking
[jobs.check]
command = ["cargo", "check", "--workspace", "--all-targets", "--color", "always"]
need_stdout = false

# Test job
[jobs.test]
command = ["cargo", "nextest", "run", "--workspace", "--color", "always"]
need_stdout = true

# Clippy job
[jobs.clippy]
command = ["cargo", "clippy", "--workspace", "--all-targets", "--color", "always", "--", "-D", "warnings"]
need_stdout = false

# Documentation
[jobs.doc]
command = ["cargo", "doc", "--workspace", "--no-deps", "--color", "always"]
need_stdout = false

# Keybindings
[keybindings]
c = "job:check"
t = "job:test"
l = "job:clippy"
d = "job:doc"
s = "toggle-summary"
g = "toggle-backtrace"