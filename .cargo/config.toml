[build]
# Build configuration for Sinex
# Job count controlled by CARGO_BUILD_JOBS env var (set in NixOS performance.nix)
# Default: 8 parallel crates × ~2GB = ~16GB peak memory
jobs = 6
pipelining = true
target-dir = ".sinex/cache/target"

# Shared build cache across the workspace (experimental)
[unstable]
build-std-features = []

# Default rustflags for stable, fast development
# NOTE: Cranelift backend disabled due to ICE issues - see config-cranelift.toml for experimental version
[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C",
  "link-arg=-fuse-ld=mold",     # Fastest linker available
  "--check-cfg=cfg(rust_analyzer)",
]

[alias]
# Provide escape hatch if built-in test is really needed
test-builtin = ["test"]

# Replacement for the removed `cargo test` override (no longer supported by cargo)
test-nextest = ["nextest", "run"]

# Quick test aliases
t = ["nextest", "run"]
tf = ["nextest", "run", "-E", "test(unit::) or test(property::)"] # Fast tests
tu = ["nextest", "run", "-E", "test(unit::)"]                     # Unit tests only
ti = ["nextest", "run", "-E", "test(integration::)"]              # Integration tests
tp = ["nextest", "run", "-E", "test(property::)"]                 # Property tests
# Fast development aliases
c = ["check", "--workspace"] # Fast check
cc = ["check", "--workspace", "--all-targets"] # Check all targets
cf = ["check", "--workspace", "--features"] # Check with features

# Environment defaults
[env]
RUST_BACKTRACE = "0"                   # Disable backtraces for speed
# Incremental builds are governed by `[profile.dev] incremental = true` in the
# workspace Cargo.toml. CARGO_INCREMENTAL is intentionally NOT pinned here so the
# profile setting applies (workspace crates incremental, registry deps not).
# RUSTC_WRAPPER (sccache) is disabled in the sinex devshell — it conflicts with
# incremental and gave ~0 on the constantly-changing iterating crate.
CARGO_NET_GIT_FETCH_WITH_CLI = "false" # Faster git operations


[target.'cfg(coverage)']
# Coverage-specific configuration
rustflags = [
  "-C",
  "instrument-coverage",
  "-C",
  "llvm-args=--instrprof-atomic-counter-update-all",
]

# Coverage profile
[profile.coverage]
inherits = "test"
debug = true
incremental = false
codegen-units = 1
overflow-checks = false

# Coverage exclusions are handled via command line flags in justfile
# to keep them visible and maintainable
