[build]
# Build configuration for Sinex

[alias]
# Make 'cargo test' use nextest for better performance
# This prevents accidentally running the slow built-in test runner
test = ["nextest", "run"]

# Provide escape hatch if built-in test is really needed
test-builtin = ["test"]

# Quick test aliases
t = ["nextest", "run"]
tf = ["nextest", "run", "-E", "test(unit::) or test(property::)"]  # Fast tests
tu = ["nextest", "run", "-E", "test(unit::)"]                      # Unit tests only
ti = ["nextest", "run", "-E", "test(integration::)"]               # Integration tests
tp = ["nextest", "run", "-E", "test(property::)"]                  # Property tests

[env]
# Environment variables for coverage and testing
CARGO_LLVM_COV_TARGET_DIR = { value = "target/llvm-cov", relative = true }

[target.'cfg(coverage)']
# Coverage-specific configuration
rustflags = [
    "-C", "instrument-coverage",
    "-C", "llvm-args=--instrprof-atomic-counter-update-all",
]

# Coverage profile
[profile.coverage]
inherits = "test"
debug = true
incremental = false
codegen-units = 1
overflow-checks = false

# Coverage exclusions are handled via command line flags in justfile
# to keep them visible and maintainable