[build]
# Build configuration for Sinex
# Speed optimizations for development
target-dir = "target"
incremental = true
pipelining = true
# Use all available CPU cores for compilation (override locally if needed)
jobs = 24
rustc-workspace-wrapper = "scripts/rustc_wrapper.sh"

# Shared build cache across the workspace (experimental)
[unstable]
build-std-features = []

# Default rustflags for stable, fast development
# NOTE: Cranelift backend disabled due to ICE issues - see config-cranelift.toml for experimental version
[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C",
  "link-arg=-fuse-ld=mold",     # Fastest linker available
  "-C",
  "codegen-units=256",          # Maximize parallelism
  "--check-cfg=cfg(rust_analyzer)",
]

[alias]
# Provide escape hatch if built-in test is really needed
test-builtin = ["test"]

# Replacement for the removed `cargo test` override (no longer supported by cargo)
test-nextest = ["nextest", "run"]

# Quick test aliases
t = ["nextest", "run"]
tf = ["nextest", "run", "-E", "test(unit::) or test(property::)"] # Fast tests
tu = ["nextest", "run", "-E", "test(unit::)"]                     # Unit tests only
ti = ["nextest", "run", "-E", "test(integration::)"]              # Integration tests
tp = ["nextest", "run", "-E", "test(property::)"]                 # Property tests
xtask = ["run", "--package", "xtask", "--"]

# Ultra-fast development aliases
c = ["check", "--workspace", "--profile", "dev-fast"] # Super fast check
cc = [
  "check",
  "--workspace",
  "--all-targets",
  "--profile",
  "dev-fast",
] # Check all targets
cf = [
  "check",
  "--workspace",
  "--profile",
  "dev-fast",
  "--features",
] # Check with features

# Environment variables for coverage and testing
[env]
CARGO_LLVM_COV_TARGET_DIR = { value = "target/llvm-cov", relative = true }
# Allow callers (e.g. `cargo xtask ci postgres`) to override these when they
# intentionally point at an ephemeral database.
PGHOST = { value = "/run/postgresql", force = false }
PGUSER = { value = "sinity", force = false }
PGDATABASE = { value = "sinex_dev", force = false }
DATABASE_URL = { value = "postgresql:///sinex_dev?host=/run/postgresql", force = false }

# Speed optimizations via environment variables
CARGO_INCREMENTAL = "1"                # Enable incremental compilation
RUST_BACKTRACE = "0"                   # Disable backtraces for speed
# RUSTC_WRAPPER set dynamically in nix shell for sccache
CARGO_NET_GIT_FETCH_WITH_CLI = "false" # Faster git operations


[target.'cfg(coverage)']
# Coverage-specific configuration
rustflags = [
  "-C",
  "instrument-coverage",
  "-C",
  "llvm-args=--instrprof-atomic-counter-update-all",
]

# Coverage profile
[profile.coverage]
inherits = "test"
debug = true
incremental = false
codegen-units = 1
overflow-checks = false

# Coverage exclusions are handled via command line flags in justfile
# to keep them visible and maintainable
