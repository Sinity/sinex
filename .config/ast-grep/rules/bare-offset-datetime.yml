id: bare-offset-datetime
message: "Use Timestamp wrapper instead of bare OffsetDateTime"
severity: warning
language: rust
rule:
  pattern: OffsetDateTime::now_utc()
# NO AUTO-FIX: Context-dependent transformation
# - Where context expects Timestamp → Timestamp::now()
# - Where context expects OffsetDateTime → keep OffsetDateTime::now_utc()
# Manual review required for each case
ignores:
  # Timestamp internals and xtask/tooling legitimately use OffsetDateTime directly.
  - "xtask/**"
  - "crate/sinexctl/**"
  - "crate/sinex-primitives/src/primitives/timestamp.rs"
  - "crate/sinex-primitives/src/temporal.rs"
  - "crate/sinexd/src/api/handlers/telemetry.rs"
note: |
  The codebase uses Timestamp as the canonical time wrapper.
  Consider using Timestamp::now() instead of OffsetDateTime::now_utc()
  where the context expects a Timestamp.
