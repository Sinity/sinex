# =============================================================================
# Nextest Configuration
# =============================================================================
# Profiles:
#   default  - Standard runs (use for CI and pre-commit)
#   debug    - Single-threaded with full output for debugging
# =============================================================================

# Use for: CI, pre-commit checks, general development
[profile.default]
# -----------------------------------------------------------------------------
# default: Standard runs
# -----------------------------------------------------------------------------
fail-fast          = false
test-threads       = 24
retries            = 0
slow-timeout       = { period = "60s", terminate-after = 1 }
failure-output     = "immediate-final"
success-output     = "never"
status-level       = "pass"
final-status-level = "fail"

[profile.default.junit]
path                 = "target/nextest/junit.xml"
store-success-output = false
store-failure-output = true

# -----------------------------------------------------------------------------
# debug: Single-threaded debugging
# -----------------------------------------------------------------------------
# Use for: Investigating flaky tests, seeing full output
[profile.debug]
test-threads   = 1
retries        = 0
slow-timeout   = { period = "300s", terminate-after = 1 }
failure-output = "immediate-final"
success-output = "immediate-final"
