[profile.default]
# Run tests in parallel - optimized for 24-core system
# Use num-cpus to dynamically adapt to the system
test-threads = "num-cpus"

# Show output for failed tests immediately with full context
failure-output = "immediate-final"
success-output = "never"

# Status output - show progress
status-level = "pass"

# Retry flaky tests once
retries = 1

# Simple timeout - if a test takes more than 2 minutes, something is wrong
slow-timeout = { period = "120s", terminate-after = 1 }


# Better failure reporting
[profile.default.junit]
path = "target/nextest/junit.xml"
store-success-output = false
store-failure-output = true

# Fast profile for development - shorter timeout and fewer threads
[profile.fast]
# Fast local runs: use available CPU; heavy DB/NATS tests are capped via test groups.
test-threads = "num-cpus"
failure-output = "immediate-final"
success-output = "never"
retries = 0
slow-timeout = { period = "60s", terminate-after = 1 }


# Reliable profile for CI - more retries, limited parallelism
[profile.reliable]
# CI/reliable runs: keep overall concurrency high while capping DB/NATS-heavy tests.
test-threads = "num-cpus"
failure-output = "immediate-final"
success-output = "never"
retries = 3
slow-timeout = { period = "180s", terminate-after = 1 }


# Debug profile - show all output
[profile.debug]
test-threads = 1
failure-output = "immediate-final"
success-output = "immediate-final"
retries = 0
slow-timeout = { period = "300s", terminate-after = 1 }


# Parallel profile - maximum parallelism for speed
[profile.parallel]
# Use all available CPUs for maximum speed
test-threads = "num-cpus"
# Minimize output for speed
failure-output = "final"
success-output = "never"
# No retries for speed
retries = 0
# Shorter timeout for parallel execution
slow-timeout = { period = "60s", terminate-after = 1 }


# CI parallel profile - balanced for reliability with good parallelism
[profile.ci-parallel]
# Use num-cpus and let runners size themselves (set NEXTEST_TEST_THREADS if you need to reserve headroom).
test-threads = "num-cpus"
failure-output = "immediate-final"
success-output = "never"
# One retry for flaky tests
retries = 1
slow-timeout = { period = "120s", terminate-after = 1 }

# --- Test groups -------------------------------------------------------------
#
# “Tetris scheduling”: let non-DB tests saturate CPU while capping DB/NATS-heavy tests so shared
# infrastructure stays stable under parallelism.

[test-groups]
db-nats-heavy = { max-threads = 4 }

# --- Per-test overrides ------------------------------------------------------
#
# Assign known DB/NATS-heavy integration binaries to the capped group. Everything else runs with
# the profile's global `test-threads`.
#
# Use `binary_id(...)` as listed by:
#   `cargo nextest list --workspace --list-type binaries-only`
#
# Filter syntax: https://nexte.st/docs/filtersets/reference/

[[profile.fast.overrides]]
filter = "binary_id(sinex-e2e-tests::jetstream_bootstrap_test)"
test-group = "db-nats-heavy"

[[profile.fast.overrides]]
filter = "binary_id(sinex-e2e-tests::pipeline_end_to_end)"
test-group = "db-nats-heavy"

[[profile.fast.overrides]]
filter = "binary_id(sinex-e2e-tests::service_recovery_test)"
test-group = "db-nats-heavy"

[[profile.fast.overrides]]
filter = "binary_id(sinex-e2e-tests::work_queue_resilience_test)"
test-group = "db-nats-heavy"

[[profile.fast.overrides]]
filter = "binary_id(sinex-ingestd::jetstream_*)"
test-group = "db-nats-heavy"

[[profile.fast.overrides]]
filter = "binary_id(sinex-ingestd::*integration*)"
test-group = "db-nats-heavy"

[[profile.fast.overrides]]
filter = "binary_id(sinex-satellite-sdk::stage_as_you_go_integration)"
test-group = "db-nats-heavy"

[[profile.fast.overrides]]
filter = "binary_id(sinex-core::property_tests) & test(/test_ulid_ordering_with_timing_patterns/)"
slow-timeout = { period = "120s", terminate-after = 1 }

[[profile.reliable.overrides]]
filter = "binary_id(sinex-e2e-tests::jetstream_bootstrap_test)"
test-group = "db-nats-heavy"

[[profile.reliable.overrides]]
filter = "binary_id(sinex-e2e-tests::pipeline_end_to_end)"
test-group = "db-nats-heavy"

[[profile.reliable.overrides]]
filter = "binary_id(sinex-e2e-tests::service_recovery_test)"
test-group = "db-nats-heavy"

[[profile.reliable.overrides]]
filter = "binary_id(sinex-e2e-tests::work_queue_resilience_test)"
test-group = "db-nats-heavy"

[[profile.reliable.overrides]]
filter = "binary_id(sinex-ingestd::jetstream_*)"
test-group = "db-nats-heavy"

[[profile.reliable.overrides]]
filter = "binary_id(sinex-ingestd::*integration*)"
test-group = "db-nats-heavy"

[[profile.reliable.overrides]]
