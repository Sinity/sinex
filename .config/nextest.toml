# =============================================================================
# Nextest Configuration
# =============================================================================
# Profiles:
#   default  - Standard runs (use for CI and pre-commit)
#   debug    - Single-threaded with full output for debugging
# =============================================================================

# Use for: CI, pre-commit checks, general development
[profile.default]
# -----------------------------------------------------------------------------
# default: Standard runs
# -----------------------------------------------------------------------------
fail-fast          = false
test-threads       = 24
retries            = 0
slow-timeout       = { period = "60s", terminate-after = 2 }
failure-output     = "immediate-final"
success-output     = "never"
status-level       = "pass"
final-status-level = "fail"

[profile.default.junit]
path                 = ".sinex/nextest/junit.xml"
store-success-output = false
store-failure-output = true

# E2E and integration tests get longer timeouts (full pipeline setup)
[[profile.default.overrides]]
filter = "package(sinex-e2e-tests)"
slow-timeout = { period = "120s", terminate-after = 2 }

# Heavy integration tests in core packages also need more time
[[profile.default.overrides]]
filter = "package(sinex-ingestd) & test(/integration|pipeline|stress|chaos/)"
slow-timeout = { period = "120s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "package(sinex-node-sdk) & test(/integration|material_acquisition|replay|blob|checkpoint|property/)"
slow-timeout = { period = "120s", terminate-after = 2 }

# Schema and DB tests need time for pool provisioning under load
[[profile.default.overrides]]
filter = "package(sinex-db) | package(sinex-schema)"
slow-timeout = { period = "90s", terminate-after = 2 }

# Services tests use DB + may wait for events
[[profile.default.overrides]]
filter = "package(sinex-services)"
slow-timeout = { period = "90s", terminate-after = 2 }

# -----------------------------------------------------------------------------
# debug: Single-threaded debugging
# -----------------------------------------------------------------------------
# Use for: Investigating flaky tests, seeing full output
[profile.debug]
test-threads   = 1
retries        = 0
slow-timeout   = { period = "300s", terminate-after = 1 }
failure-output = "immediate-final"
success-output = "immediate-final"
