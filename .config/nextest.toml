# =============================================================================
# Nextest Configuration
# =============================================================================
# Profiles:
#   default  - Standard nextest runs (used by xtask test locally and inside CI stages)
#   debug    - Single-threaded with full output for debugging
# =============================================================================

[store]
# Keep all nextest-owned state under the checkout-local `.sinex/` tree instead
# of leaking a separate top-level `target/nextest` directory.
dir = ".sinex/nextest"

# Use for: general xtask test runs; retries are intentionally disabled.
[profile.default]
# -----------------------------------------------------------------------------
# default: Standard runs with no automatic retries
# -----------------------------------------------------------------------------
fail-fast          = false
test-threads       = "num-cpus"
retries            = 0
slow-timeout       = { period = "60s", terminate-after = 2 }
failure-output     = "immediate"
success-output     = "immediate"
status-level       = "pass"
final-status-level = "fail"

[profile.default.junit]
path                 = "junit.xml"
store-success-output = true
store-failure-output = true

# E2E and integration tests get longer timeouts (full pipeline setup)
[[profile.default.overrides]]
filter = "package(sinex-e2e-tests)"
slow-timeout = { period = "120s", terminate-after = 2 }

# Heavy integration tests in core packages also need more time
[[profile.default.overrides]]
filter = "package(sinex-ingestd) & test(/integration|pipeline|stress|chaos/)"
slow-timeout = { period = "120s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "package(sinex-node-sdk) & test(/integration|material_acquisition|replay|blob|checkpoint|property/)"
slow-timeout = { period = "120s", terminate-after = 2 }

# trybuild compile-fail tests build the dep tree on first run
[[profile.default.overrides]]
filter = "package(sinex-macros) & test(/compile_fail/)"
slow-timeout = { period = "180s", terminate-after = 2 }

# The Id<T> compile-fail test cold-builds a full dependency tree inside its own
# isolated trybuild target directory, so the default timeout is too tight under
# a full workspace run.
[[profile.default.overrides]]
filter = "package(sinex-primitives) & test(id_type_mismatch_is_compile_error)"
slow-timeout = { period = "300s", terminate-after = 2 }

# xtask command edge case tests spawn cargo subprocesses (check, test)
[[profile.default.overrides]]
filter = "package(xtask) & test(/command_edge_cases/)"
slow-timeout = { period = "120s", terminate-after = 2 }

# Schema and DB tests need time for pool provisioning under load
[[profile.default.overrides]]
filter = "package(sinex-db) | package(sinex-schema)"
slow-timeout = { period = "90s", terminate-after = 2 }

# Services tests use DB + may wait for events
[[profile.default.overrides]]
filter = "package(sinex-services)"
slow-timeout = { period = "90s", terminate-after = 2 }

# -----------------------------------------------------------------------------
# debug: Single-threaded debugging
# -----------------------------------------------------------------------------
# Use for: Investigating failures with deterministic, single-threaded output
[profile.debug]
test-threads   = 1
retries        = 0
slow-timeout   = { period = "300s", terminate-after = 1 }
failure-output = "immediate"
success-output = "immediate"

[profile.debug.junit]
path                 = "junit.xml"
store-success-output = true
store-failure-output = true
