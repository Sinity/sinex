[profile.default]
# Run tests in parallel
test-threads = 12

# Show output for failed tests immediately with full context
failure-output = "immediate-final"
success-output = "never"

# Retry flaky tests once
retries = 1

# Simple timeout - if a test takes more than 2 minutes, something is wrong
slow-timeout = { period = "120s", terminate-after = 1 }

# Better failure reporting
[profile.default.junit]
path = "target/nextest/junit.xml"
store-success-output = false
store-failure-output = true

# Fast profile for development - shorter timeout and fewer threads
[profile.fast]
test-threads = 4
failure-output = "immediate-final"
success-output = "never"
retries = 0
slow-timeout = { period = "60s", terminate-after = 1 }

# Reliable profile for CI - more retries, limited parallelism
[profile.reliable]
test-threads = 2
failure-output = "immediate-final"
success-output = "never"
retries = 3
slow-timeout = { period = "180s", terminate-after = 1 }

# Debug profile - show all output
[profile.debug]
test-threads = 1
failure-output = "immediate-final"
success-output = "immediate-final"
retries = 0
slow-timeout = { period = "300s", terminate-after = 1 }