[profile.default]
# Run tests in parallel - optimized for 24-core system
# Use num-cpus to dynamically adapt to the system
test-threads = "num-cpus"

# Show output for failed tests immediately with full context
failure-output = "immediate-final"
success-output = "never"

# Status output - show progress
status-level = "pass"

# Retry flaky tests once
retries = 1

# Simple timeout - if a test takes more than 2 minutes, something is wrong
slow-timeout = { period = "120s", terminate-after = 1 }


# Better failure reporting
[profile.default.junit]
path = "target/nextest/junit.xml"
store-success-output = false
store-failure-output = true

# Fast profile for development - shorter timeout and fewer threads
[profile.fast]
test-threads = 4
failure-output = "immediate-final"
success-output = "never"
retries = 0
slow-timeout = { period = "60s", terminate-after = 1 }


# Reliable profile for CI - more retries, limited parallelism
[profile.reliable]
test-threads = 2
failure-output = "immediate-final"
success-output = "never"
retries = 3
slow-timeout = { period = "180s", terminate-after = 1 }
env = { LD_LIBRARY_PATH = "/nix/store/1c663ln6chbg168dmri24z9nx6i9g65a-dbus-1.14.10-lib/lib" }


# Debug profile - show all output
[profile.debug]
test-threads = 1
failure-output = "immediate-final"
success-output = "immediate-final"
retries = 0
slow-timeout = { period = "300s", terminate-after = 1 }


# Parallel profile - maximum parallelism for speed
[profile.parallel]
# Use all available CPUs for maximum speed
test-threads = "num-cpus"
# Minimize output for speed
failure-output = "final"
success-output = "never"
# No retries for speed
retries = 0
# Shorter timeout for parallel execution
slow-timeout = { period = "60s", terminate-after = 1 }


# CI parallel profile - balanced for reliability with good parallelism
[profile.ci-parallel]
# Use num-cpus and let runners size themselves (set NEXTEST_TEST_THREADS if you need to reserve headroom).
test-threads = "num-cpus"
failure-output = "immediate-final"
success-output = "never"
# One retry for flaky tests
retries = 1
slow-timeout = { period = "120s", terminate-after = 1 }
