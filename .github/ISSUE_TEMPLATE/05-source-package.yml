name: Source/Capture Package
description: Add a Sinex source/capture package mode through SourceDefinition or SourceMeta.
title: "[source] "
labels:
  - type:feat
  - area:sources
body:
  - type: markdown
    attributes:
      value: |
        A source/capture mode is a source definition plus an adapter, parser,
        event/admission contracts, disclosure behavior, resource behavior,
        coverage, operations, and fixtures — not a bespoke pipeline. Fill every
        field below. See
        `crate/sinexd/docs/sources/source_capture_package_template.md` for the
        full contract. Prefer the Rust-native derives —
        `#[derive(SourceDefinition)]` (fully declarative) or `#[derive(SourceMeta)]`
        (hand-written parser) — over manual `register_source_contract!`. Per-field
        disclosure behavior stays operator-controlled; a package-level posture
        is not final field authority. During implementation, use
        `sinexd export-package-completeness --package <id> --mode <id> --strict`
        as the focused authoring loop for the row this issue owns.
  - type: input
    id: source_id
    attributes:
      label: Source family / id
      description: Stable package/source id.
      placeholder: terminal.atuin-history
    validations:
      required: true
  - type: textarea
    id: occurrence
    attributes:
      label: External occurrence and input materials
      description: What real-world datapoint this observes, and what source material is registered (file/SQLite/IPC/API) plus the material-policy owner.
    validations:
      required: true
  - type: textarea
    id: adapter_parser
    attributes:
      label: Adapter shape and parser
      description: Which InputShapeKind / InputShapeAdapter + cursor type, and the MaterialParser that interprets records.
    validations:
      required: true
  - type: textarea
    id: events
    attributes:
      label: Emitted event types, timestamp policy, occurrence key
      description: (EventSource, EventType) pairs; how ts_orig is chosen; the (source_material_id, anchor_byte) coordinates and any object-level dedup/equivalence key (never the event id).
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Per-field privacy tier
      description: Field/material/view/export/log/completion/DLQ behavior under operator-owned policy. NOT a single source-level label.
    validations:
      required: true
  - type: textarea
    id: coverage_fixtures
    attributes:
      label: Source coverage, fixtures, and tests
      description: Stale/gap/no-data behavior; the raw→adapter→parsed→admitted→view fixture chain plus a negative case; admission/property tests; readiness view row.
    validations:
      required: true
  - type: textarea
    id: binding
    attributes:
      label: Sinnix binding (if host-specific)
      description: register_source_runtime_binding! + NixOS binding example, only if the source is host-specific.
