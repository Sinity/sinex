name: Source/Capture Package
description: Add or extend a Sinex source/capture package mode with complete runtime, admission, and view contracts.
title: "[source-package] "
labels:
  - type:feat
  - area:sources
body:
  - type: markdown
    attributes:
      value: |
        A source/capture package mode is a complete contract: source definition,
        runtime binding, adapter, parser, EventContracts, AdmissionPolicy refs,
        resource budget, material lifecycle, transport semantics, operations,
        coverage/debt visibility, fixtures, and disclosure behavior. It is not
        a bespoke private pipeline, and it is not a single source label standing
        in for provenance, schema, admission, occurrence, disclosure, or runtime
        authority. Fill every field below. See
        `crate/sinexd/docs/sources/source_capture_package_template.md` for the
        full contract. Prefer the Rust-native derives —
        `#[derive(SourceDefinition)]` (fully declarative) or `#[derive(SourceMeta)]`
        (hand-written parser) — over manual `register_source_contract!`.
        Disclosure behavior stays field-, material-, destination-, and
        operator-policy controlled; a package-level posture is not final field
        authority. During implementation, use
        `sinexd export-package-completeness --package <id> --mode <id> --strict`
        as the focused authoring loop for the row this issue owns.
  - type: input
    id: package_mode_id
    attributes:
      label: Package id and mode id
      description: Stable package family plus the runnable or proposed mode this issue owns.
      placeholder: email.mailbox / imap-live
    validations:
      required: true
  - type: textarea
    id: occurrence
    attributes:
      label: RawMaterial, material class, and external occurrence
      description: What real-world datapoint this observes, which RawMaterial/material classes are registered, how material lifecycle is represented, and which object-level occurrence coordinates identify records.
    validations:
      required: true
  - type: textarea
    id: adapter_parser
    attributes:
      label: Runtime binding, adapter, cursor/checkpoint, and parser
      description: Which SourceRuntimeBinding, InputShapeKind/InputShapeAdapter, cursor/checkpoint type, and MaterialParser interpret the input.
    validations:
      required: true
  - type: textarea
    id: events
    attributes:
      label: Event contracts, timestamp policy, occurrence key
      description: EventContract ids, payload schemas, source/event namespace, how ts_orig is chosen, material anchors, dedup/equivalence, and scope keys. Do not use source/source_id as schema, admission, privacy, or occurrence authority.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Disclosure and privacy matrix
      description: Field, material, view, export, log, completion, DLQ/quarantine, telemetry, search, and evidence-window behavior under operator-owned policy. Do not collapse this into a package-level label.
    validations:
      required: true
  - type: textarea
    id: coverage_fixtures
    attributes:
      label: Coverage, debt, fixtures, and tests
      description: Stale/gap/no-data/deferred/rejected behavior; raw→adapter→parsed→admitted→view fixture chain plus a negative case; admission/property tests; coverage/debt/operator rows.
    validations:
      required: true
  - type: textarea
    id: runtime_operations
    attributes:
      label: Resource budget, transport, operations, deployment
      description: ResourceBudgetSpec, transport semantics, ack/replay/DLQ/backpressure behavior, package operations, runtime/degraded states, and Sinnix binding if host-specific.
    validations:
      required: true
