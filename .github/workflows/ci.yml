name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Devenv Integration Test
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
    - uses: actions/checkout@v5

    - uses: ./.github/actions/nix-bootstrap
      with:
        cache-name: sinity
        cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

    - name: Run migrations and tests
      shell: bash
      env:
        DEVENV_ROOT: ${{ github.workspace }}
        DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
      run: |
        set -euo pipefail
        DEVENV_ROOT="$DEVENV_ROOT" DEVENV_DOTFILE="$DEVENV_DOTFILE" nix develop --no-pure-eval --command bash <<'SCRIPT'
        set -euo pipefail
        export CARGO_TARGET_DIR="$PWD/target-ci"
        devenv test
        scripts/ci-postgres.sh <<'INNER'
        pushd crate/lib/sinex-schema >/dev/null
        DATABASE_URL="$DATABASE_URL_SUPERUSER" cargo run -- up
        popd
        bash scripts/check_forbidden_patterns.sh
        ./scripts/schema-dev.sh generate
        if ! git diff --quiet -- schemas; then
          echo "::error::Schema artifacts are stale. Run './scripts/schema-dev.sh generate' locally."
          git status schemas
          exit 1
        fi
        devenv tasks run dev:test
        INNER
        rm -rf "$CARGO_TARGET_DIR"
        SCRIPT
