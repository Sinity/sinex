name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Devenv Integration Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - uses: cachix/cachix-action@v16
      with:
        name: sinity
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipPush: true

    - name: Install devenv.sh
      shell: bash
      run: nix profile install nixpkgs#devenv

    - name: Run migrations and tests
      shell: 'nix develop --no-pure-eval --command bash --noprofile --norc -euo pipefail {0}'
      env:
        DEVENV_ROOT: ${{ github.workspace }}
        DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
      run: |
        devenv test

        export PGDATA="$PWD/postgres_data"
        rm -rf "$PGDATA"
        mkdir -p "$PGDATA"
        initdb --auth=trust --no-locale --encoding=UTF8
        echo "unix_socket_directories = '$PWD'" >> "$PGDATA/postgresql.conf"
        pg_ctl start -l postgres.log -o "-k $PWD"
        trap 'pg_ctl stop' EXIT
        psql -h "$PWD" -d postgres -v ON_ERROR_STOP=1 -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'sinity') THEN CREATE ROLE sinity LOGIN CREATEDB; END IF; END \$\$;"
        psql -h "$PWD" -d postgres -v ON_ERROR_STOP=1 -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'sinex_dev') THEN CREATE DATABASE sinex_dev OWNER sinity; END IF; END \$\$;"
        psql -h "$PWD" -U sinity -d sinex_dev -c 'SELECT 1' >/dev/null
        export PGHOST="$PWD"
        export DATABASE_URL="postgresql:///sinex_dev?host=$PWD"
        devenv tasks run db:migrate
        bash scripts/check_forbidden_patterns.sh
        ./scripts/schema-dev.sh generate
        if ! git diff --quiet -- schemas; then
          echo "::error::Schema artifacts are stale. Run './scripts/schema-dev.sh generate' locally."
          git status schemas
          exit 1
        fi
        devenv tasks run dev:test
