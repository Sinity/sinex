name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Devenv Integration Test
    runs-on: ubuntu-latest
    env:
      DEVENV_ROOT: ${{ github.workspace }}
      DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
    - uses: actions/checkout@v5

    - name: Prepare cache directories
      run: |
        mkdir -p ~/.cache/sccache
        mkdir -p ~/.cargo/registry
        mkdir -p ~/.cargo/git

    - name: Cache sccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/sccache
        key: sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: sccache-${{ runner.os }}-

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: cargo-registry-${{ runner.os }}-

    - name: Cache cargo git
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: cargo-git-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: cargo-git-${{ runner.os }}-

    - uses: ./.github/actions/nix-bootstrap
      with:
        cache-name: sinity
        cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

    - name: Run migrations and tests
      shell: bash
      run: |
        nix develop --accept-flake-config --no-pure-eval --command \
          cargo xtask ci postgres -- \
          cargo xtask ci workspace
