name: SQLX Cache Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.rs'
      - '**.sql'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.sqlx/**'

jobs:
  sqlx-check:
    name: Verify SQLX offline cache
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sinex_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install sqlx-cli
        run: |
          cargo install sqlx-cli --no-default-features --features native-tls,postgres
      
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sinex_test
        run: |
          cd crate/lib/sinex-schema
          cargo run -- up
      
      - name: Check SQLX offline cache is up to date
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sinex_test
        run: |
          # Generate fresh cache
          cargo sqlx prepare --workspace --check -- --all-targets --all-features
      
      - name: Verify offline mode compilation
        env:
          SQLX_OFFLINE: true
        run: |
          cargo check --all-features
      
      - name: Run tests with offline mode
        env:
          SQLX_OFFLINE: true
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sinex_test
        run: |
          cargo nextest run --all-features
