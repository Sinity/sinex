name: SQLX Cache Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.rs'
      - '**.sql'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.sqlx/**'

jobs:
  sqlx-check:
    name: Verify SQLX offline cache
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v16
        with:
          name: sinity
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Install devenv.sh
        shell: bash
        run: nix profile install nixpkgs#devenv

      - name: Run SQLx checks inside Nix
        shell: 'nix develop --no-pure-eval --command bash --noprofile --norc -euo pipefail {0}'
        env:
          DEVENV_ROOT: ${{ github.workspace }}
          DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
        run: |
          export PGDATA="$PWD/postgres_data"
          rm -rf "$PGDATA"
          mkdir -p "$PGDATA"
          initdb --auth=trust --no-locale --encoding=UTF8
          echo "unix_socket_directories = '$PWD'" >> "$PGDATA/postgresql.conf"
          pg_ctl start -l postgres.log -o "-k $PWD"
          trap 'pg_ctl stop' EXIT

          SUPERUSER=$(id -un)
          if ! PGUSER="$SUPERUSER" psql -h "$PWD" -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname = 'sinity'" | grep -q 1; then
            PGUSER="$SUPERUSER" psql -h "$PWD" -d postgres -v ON_ERROR_STOP=1 -c "CREATE ROLE sinity LOGIN CREATEDB;"
          fi
          if ! PGUSER="$SUPERUSER" psql -h "$PWD" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'sinex_dev'" | grep -q 1; then
            PGUSER="$SUPERUSER" psql -h "$PWD" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE sinex_dev OWNER sinity;"
          fi

          export PGHOST="$PWD"
          export DATABASE_URL="postgresql:///sinex_dev?host=$PWD"

          devenv tasks run db:migrate

          cargo sqlx prepare --workspace --check -- --all-targets --all-features

          SQLX_OFFLINE=1 cargo check --all-features

          SQLX_OFFLINE=1 TEST_DATABASE_URL="postgresql:///sinex_dev?host=$PWD" \
            cargo nextest run --all-features
