name: SQLX Cache Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.rs'
      - '**.sql'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.sqlx/**'

jobs:
  sqlx-check:
    name: Verify SQLX offline cache
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v16
        with:
          name: sinity
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install devenv.sh
        shell: bash
        run: nix profile install nixpkgs#devenv

      - name: Run SQLx checks inside Nix
        shell: bash
        env:
          DEVENV_ROOT: ${{ github.workspace }}
          DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
        run: |
          set -euo pipefail
          DEVENV_ROOT="$DEVENV_ROOT" DEVENV_DOTFILE="$DEVENV_DOTFILE" nix develop --no-pure-eval --command bash <<'SCRIPT'
          set -euo pipefail
          scripts/ci-postgres.sh <<'INNER'
          pushd crate/lib/sinex-schema >/dev/null
          DATABASE_URL="$DATABASE_URL_SUPERUSER" cargo run -- up
          popd

          export CARGO_TARGET_DIR="$PWD/target-sqlx-check"
          cargo sqlx prepare --workspace --check -- --all-targets --all-features
          rm -rf "$CARGO_TARGET_DIR"

          export CARGO_TARGET_DIR="$PWD/target-sqlx-offline"
          SQLX_OFFLINE=1 cargo check --all-features
          rm -rf "$CARGO_TARGET_DIR" target
          INNER
          SCRIPT
