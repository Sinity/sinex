name: Verify Perf

permissions:
  contents: read

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-perf:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v5

    - uses: ./.github/actions/nix-bootstrap
      with:
        cache-name: sinity
        cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

    - name: Run perf contract verification
      shell: bash
      run: |
        mkdir -p .artifacts
        nix develop --accept-flake-config --no-pure-eval --command \
          xtask ci postgres -- \
          xtask test bench --contracts \
            --profile fast \
            --runs 2 \
            --threads 12,24 \
            --output .artifacts/verify-perf \
            --history-db .artifacts/bench-verify-history.db

    - name: Upload perf artifacts
      uses: actions/upload-artifact@v4
      with:
        name: verify-perf-artifacts
        path: |
          .artifacts/verify-perf
          .artifacts/bench-verify-history.db
        if-no-files-found: warn
