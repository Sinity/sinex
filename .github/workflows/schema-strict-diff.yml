name: Schema Strict Diff

permissions:
  contents: read

on:
  workflow_dispatch:

# Why: declarative `xtask schema apply` reconciles missing tables/columns/named
# constraints/indexes/triggers/views/CAs, but does NOT reconcile trigger
# function bodies, DEFAULT changes on existing columns, inline CHECKs, FK
# ON DELETE/UPDATE actions, hypertable settings, or orphan columns. Strict-diff
# catches drift in those categories.
#
# This workflow is manual-only by repository policy: hosted Actions should not
# auto-spend minutes for PR feedback. PRs touching schema surfaces record local
# `xtask schema strict-diff` evidence instead, and reviewers may invoke this
# workflow explicitly when they want a hosted confirmation run.

jobs:
  strict-diff:
    name: xtask schema strict-diff
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v5

      - name: Install nix
        uses: cachix/install-nix-action@v27

      - name: Run schema-only drift gate
        shell: bash
        # `xtask ci postgres` starts the ephemeral Postgres and exports
        # DATABASE_URL *before* running the inner command, so sinex-db's
        # `sqlx::query!` macros compile against the live database -- the same
        # pattern the main workspace gate uses. No offline query cache.
        #
        # Cold GitHub runners may build the devshell/xtask dependency closure
        # before `xtask` starts. Keep Nix logs enabled and bound that bootstrap
        # below the job timeout so failures show whether Nix bootstrap or the
        # schema drift gate consumed the budget.
        run: |
          set -euo pipefail
          echo "::group::nix develop bootstrap"
          nix --version
          echo "Entering the Sinex devshell with Nix build logs enabled."
          echo "::endgroup::"
          timeout --foreground 60m nix -L develop --accept-flake-config --no-pure-eval --command bash -lc '
            set -euo pipefail
            echo "::group::schema-only drift gate"
            echo "Running: xtask ci postgres -- xtask ci schema-only"
            xtask ci postgres -- xtask ci schema-only
            echo "::endgroup::"
          '
