name: Schema Strict Diff

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'crate/lib/sinex-schema/**'
      - 'crate/lib/sinex-db/**'
      - '.github/workflows/schema-strict-diff.yml'

# Why: declarative `xtask schema apply` reconciles missing tables/columns/named
# constraints/indexes/triggers/views/CAs, but does NOT reconcile trigger
# function bodies, DEFAULT changes on existing columns, inline CHECKs, FK
# ON DELETE/UPDATE actions, hypertable settings, or orphan columns. Strict-diff
# catches drift in those categories.
#
# Per CLAUDE.md state docs: issues #578 / #579 already track real
# source-vs-live drift the strict diff caught on fresh-apply state. Wired to
# PRs touching schema sources so drift surfaces on the changing PR, not weeks
# later when a developer remembers to run `xtask ci postgres -- xtask ci
# schema-only` locally (#1217).

jobs:
  strict-diff:
    name: xtask schema strict-diff
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sinex
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Install nix
        uses: cachix/install-nix-action@v27

      - name: Run schema-only drift gate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sinex
          PGDATABASE: sinex
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          SUPERUSER: postgres
        run: nix develop --command xtask ci schema-only
