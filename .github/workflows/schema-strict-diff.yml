name: Schema Strict Diff

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'crate/sinex-schema/**'
      - 'crate/sinex-db/**'
      - '.sqlx/**'
      - '.github/workflows/schema-strict-diff.yml'

# Why: declarative `xtask schema apply` reconciles missing tables/columns/named
# constraints/indexes/triggers/views/CAs, but does NOT reconcile trigger
# function bodies, DEFAULT changes on existing columns, inline CHECKs, FK
# ON DELETE/UPDATE actions, hypertable settings, or orphan columns. Strict-diff
# catches drift in those categories.
#
# Per CLAUDE.md state docs: issues #578 / #579 already track real
# source-vs-live drift the strict diff caught on fresh-apply state. Wired to
# PRs touching schema sources so drift surfaces on the changing PR, not weeks
# later when a developer remembers to run `xtask ci postgres -- xtask ci
# schema-only` locally (#1217).

jobs:
  strict-diff:
    name: xtask schema strict-diff
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Install nix
        uses: cachix/install-nix-action@v27

      - name: Run schema-only drift gate
        shell: bash
        env:
          # SQLX_OFFLINE=true lets cargo compile sinex-db using the committed
          # .sqlx/ query cache rather than connecting to a live database.
          # This avoids the chicken-and-egg: the xtask wrapper must compile
          # sinex-db before postgres starts, so a live DATABASE_URL is not
          # available at build time. Runtime schema validation still happens
          # through xtask ci schema-only against the ephemeral postgres.
          SQLX_OFFLINE: "true"
        run: |
          nix develop --accept-flake-config --no-pure-eval --command bash -lc '
            set -euo pipefail
            xtask ci postgres -- xtask ci schema-only
          '
