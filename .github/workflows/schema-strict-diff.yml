name: Schema Strict Diff

permissions:
  contents: read

on:
  workflow_dispatch:

# Why: declarative `xtask schema apply` reconciles missing tables/columns/named
# constraints/indexes/triggers/views/CAs, but does NOT reconcile trigger
# function bodies, DEFAULT changes on existing columns, inline CHECKs, FK
# ON DELETE/UPDATE actions, hypertable settings, or orphan columns. Strict-diff
# catches drift in those categories.
#
# Per CLAUDE.md state docs: issues #578 / #579 already track real
# source-vs-live drift the strict diff caught on fresh-apply state. Wiring this
# as its own workflow gives the gate a green-history baseline and surfaces
# fresh drift per PR rather than only when developers remember to run
# `xtask ci postgres -- xtask ci schema-only` locally.

jobs:
  strict-diff:
    name: xtask schema strict-diff
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sinex
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Install nix
        uses: cachix/install-nix-action@v27

      - name: Apply schema
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sinex
        run: nix develop --command xtask schema apply

      - name: Run strict diff
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sinex
        run: nix develop --command xtask schema strict-diff
