name: Schema Compatibility Check

on:
  pull_request:
    paths:
      - 'crate/sinex-events/src/payloads/**'
      - 'crate/sinex-events/src/event.rs'
      - 'crate/sinex-macros/src/event_payload.rs'

jobs:
  check-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for comparison

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v11
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v2

      - name: Run schema compatibility check
        run: |
          chmod +x scripts/check-schema-compatibility.sh
          CI_BASE_BRANCH=${{ github.base_ref }} ./scripts/check-schema-compatibility.sh

      - name: Generate schema report
        if: always()
        run: |
          echo "## Schema Compatibility Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f schema-report.md ]; then
            cat schema-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const message = `
            ❌ **Schema Compatibility Check Failed**
            
            Please ensure:
            - Version numbers are incremented for breaking changes
            - \`evolves_from\` is specified for major version changes
            - Breaking changes are documented with \`breaking_change\` attribute
            
            Run \`./scripts/check-schema-compatibility.sh\` locally for details.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });