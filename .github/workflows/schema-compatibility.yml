name: Schema Compatibility Check

on:
  pull_request:
    paths:
      - 'schemas/**'
      - 'crate/lib/sinex-core/src/types/events/**'
      - 'scripts/check-schema-compatibility.sh'

jobs:
  check-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for comparison

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v11
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v2

      - name: Run schema compatibility check
        run: |
          chmod +x scripts/check-schema-compatibility.sh
          CI_BASE_BRANCH=${{ github.base_ref }} ./scripts/check-schema-compatibility.sh

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const message = `
            ❌ **Schema Compatibility Check Failed**
            
            Please ensure:
            - Any breaking changes get a schema version bump
            - Optional additions remain backward compatible
            
            Run \`./scripts/check-schema-compatibility.sh\` locally for details.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
