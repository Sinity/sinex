name: Schema Compatibility Check

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    paths:
      - 'schemas/**'
      - 'crate/lib/sinex-core/src/types/events/**'
      - 'xtask/src/main.rs'

jobs:
  check-schemas:
    runs-on: ubuntu-latest
    env:
      DEVENV_ROOT: ${{ github.workspace }}
      DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Need full history for comparison

      - name: Setup Nix environment
        uses: ./.github/actions/nix-bootstrap
        with:
          cache-name: sinity
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run schema compatibility check
        run: |
          nix develop --accept-flake-config --no-pure-eval --command bash -lc '
            set -euo pipefail
            CI_BASE_BRANCH=${{ github.base_ref }} cargo xtask schema compat
          '

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const message = `
            ❌ **Schema Compatibility Check Failed**

            Please ensure:
            - Any breaking changes get a schema version bump
            - Optional additions remain backward compatible

            Run \`cargo xtask schema compat --base ${{ github.base_ref }}\` locally for details.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
