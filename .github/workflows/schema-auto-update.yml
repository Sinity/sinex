name: Schema Auto Update

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate_schemas:
    runs-on: ubuntu-latest
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    env:
      DEVENV_ROOT: ${{ github.workspace }}
      DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/nix-bootstrap
        with:
          cache-name: sinity
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Regenerate schemas
        shell: bash
        run: |
          nix develop --accept-flake-config --no-pure-eval --command \
            cargo xtask ci postgres -- \
            cargo xtask ci schema-only --skip-clean

      - name: Create schema update PR
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: regenerate schemas"
          title: "chore: regenerate schemas"
          body: "Automated schema regeneration via GitHub Actions."
          branch: chore/auto-update-schemas
          labels: automated-update
          delete-branch: true
