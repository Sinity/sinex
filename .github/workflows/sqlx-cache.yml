name: SQLx Query Cache Validation

on:
  push:
    paths:
      - 'crate/**/*.rs'
      - 'crate/lib/sinex-schema/**'
      - '.sqlx/**'
  pull_request:
    paths:
      - 'crate/**/*.rs'
      - 'crate/lib/sinex-schema/**'
      - '.sqlx/**'

jobs:
  validate-cache:
    name: Validate SQLx Query Cache
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v16
        with:
          name: sinity
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install devenv.sh
        shell: bash
        run: nix profile install nixpkgs#devenv

      - name: Validate SQLx cache inside Nix
        shell: bash
        env:
          DEVENV_ROOT: ${{ github.workspace }}
          DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
        run: |
          set -euo pipefail
          DEVENV_ROOT="$DEVENV_ROOT" DEVENV_DOTFILE="$DEVENV_DOTFILE" nix develop --no-pure-eval --command bash <<'SCRIPT'
          set -euo pipefail
          scripts/ci-postgres.sh <<'INNER'
          pushd crate/lib/sinex-schema >/dev/null
          DATABASE_URL="$DATABASE_URL_SUPERUSER" cargo run -- up
          popd

          export CARGO_TARGET_DIR="$PWD/target-sqlx-cache"
          cargo sqlx prepare --workspace -- --all-targets --all-features
          rm -rf "$CARGO_TARGET_DIR"
          if git diff --quiet .sqlx; then
            rm -rf target
            exit 0
          fi

          echo "::error::SQLx query cache is outdated. Run 'cargo sqlx prepare --workspace -- --all-targets --all-features' locally and commit the changes."
          git status -sb .sqlx
          git diff .sqlx || true
          rm -rf target
          exit 1
          INNER
          SCRIPT
