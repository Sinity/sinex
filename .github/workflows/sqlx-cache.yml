name: SQLx Query Cache Validation

on:
  push:
    paths:
      - 'crate/**/*.rs'
      - 'crate/lib/sinex-schema/**'
      - '.sqlx/**'
  pull_request:
    paths:
      - 'crate/**/*.rs'
      - 'crate/lib/sinex-schema/**'
      - '.sqlx/**'

jobs:
  validate-cache:
    name: Validate SQLx Query Cache
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: timescale/timescaledb:2.15.2-pg16  # Keep in sync with main CI runs
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sinex_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres
        
      - name: Setup database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sinex_test
          PGPASSWORD: postgres
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client postgresql-contrib
          psql -h localhost -U postgres -c "CREATE USER sinex_test WITH PASSWORD 'test_password' CREATEDB"
          psql -h localhost -U postgres -c "CREATE DATABASE sinex_test OWNER sinex_test"
          psql -h localhost -U postgres -d sinex_test -c "CREATE EXTENSION IF NOT EXISTS timescaledb"
          cd crate/lib/sinex-schema
          cargo run -- up
          
      - name: Check query cache is current
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sinex_test
        run: |
          cargo sqlx prepare --check --workspace
          
      - name: Update cache if outdated
        if: failure()
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sinex_test
        run: |
          echo "::error::SQLx query cache is outdated. Run 'cargo sqlx prepare --workspace' locally and commit the changes."
          cargo sqlx prepare --workspace
          git diff --exit-code .sqlx || (echo "::error::Cache would be updated with these changes:" && git diff .sqlx && exit 1)
