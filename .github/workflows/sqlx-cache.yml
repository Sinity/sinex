name: SQLx Query Cache Validation

on:
  push:
    paths:
      - 'crate/**/*.rs'
      - 'crate/lib/sinex-schema/**'
      - '.sqlx/**'
  pull_request:
    paths:
      - 'crate/**/*.rs'
      - 'crate/lib/sinex-schema/**'
      - '.sqlx/**'

jobs:
  validate-cache:
    name: Validate SQLx Query Cache
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v16
        with:
          name: sinity
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Install devenv.sh
        shell: bash
        run: nix profile install nixpkgs#devenv

      - name: Validate SQLx cache inside Nix
        shell: 'nix develop --no-pure-eval --command bash --noprofile --norc -euo pipefail {0}'
        env:
          DEVENV_ROOT: ${{ github.workspace }}
          DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
        run: |
          export PGDATA="$PWD/postgres_data"
          rm -rf "$PGDATA"
          mkdir -p "$PGDATA"
          initdb --auth=trust --no-locale --encoding=UTF8
          echo "unix_socket_directories = '$PWD'" >> "$PGDATA/postgresql.conf"
          pg_ctl start -l postgres.log -o "-k $PWD"
          trap 'pg_ctl stop' EXIT

          PGUSER=postgres psql -h "$PWD" -d postgres -v ON_ERROR_STOP=1 -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'sinity') THEN CREATE ROLE sinity LOGIN CREATEDB; END IF; END \$\$;"
          PGUSER=postgres psql -h "$PWD" -d postgres -v ON_ERROR_STOP=1 -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'sinex_dev') THEN CREATE DATABASE sinex_dev OWNER sinity; END IF; END \$\$;"

          export PGHOST="$PWD"
          export DATABASE_URL="postgresql:///sinex_dev?host=$PWD"

          devenv tasks run db:migrate

          if cargo sqlx prepare --workspace --check -- --all-targets --all-features; then
            exit 0
          fi

          echo "::error::SQLx query cache is outdated. Run 'cargo sqlx prepare --workspace' locally and commit the changes."
          cargo sqlx prepare --workspace -- --all-targets --all-features
          if ! git diff --quiet .sqlx; then
            git diff .sqlx
          fi
          exit 1
