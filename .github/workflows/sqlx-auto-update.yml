name: SQLx Cache Auto Update

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DEVENV_ROOT: ${{ github.workspace }}
      DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/nix-bootstrap
        with:
          cache-name: sinity
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Regenerate SQLx cache
        shell: bash
        run: |
          scripts/ci-devenv.sh bash <<'DEVENV'
          set -euo pipefail
          scripts/ci-postgres.sh <<'POSTGRES'
          ./scripts/sqlx-prepare.sh
          POSTGRES
          DEVENV

      - name: Create SQLx cache PR
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: refresh SQLx cache"
          title: "chore: refresh SQLx cache"
          body: "Automated SQLx cache regeneration via GitHub Actions."
          branch: chore/auto-update-sqlx-cache
          labels: automated-update
          delete-branch: true
