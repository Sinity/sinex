name: SQLx Cache Auto Update

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: timescale/timescaledb:2.15.2-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sinex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features native-tls,postgres

      - name: Setup database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sinex_test
          PGPASSWORD: postgres
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client postgresql-contrib
          psql -h localhost -U postgres -c "CREATE USER sinex_test WITH PASSWORD 'test_password' CREATEDB"
          psql -h localhost -U postgres -c "CREATE DATABASE sinex_test OWNER sinex_test"
          psql -h localhost -U postgres -d sinex_test -c "CREATE EXTENSION IF NOT EXISTS timescaledb"
          cd crate/lib/sinex-schema
          cargo run -- up

      - name: Refresh SQLx cache
        env:
          DATABASE_URL: postgres://sinex_test:test_password@localhost/sinex_test
        run: cargo sqlx prepare --workspace -- --all-targets

      - name: Create SQLx cache PR
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: refresh SQLx cache"
          title: "chore: refresh SQLx cache"
          body: "Automated SQLx cache regeneration via GitHub Actions."
          branch: chore/auto-update-sqlx-cache
          labels: automated-update
