name: Verify Source-Worker

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'crate/core/sinex-source-worker/**'
      - 'crate/lib/sinex-node-sdk/src/parser/**'
      - 'crate/lib/sinex-primitives/src/source_unit/**'
      - 'nixos/modules/source-workers.nix'
      - 'docs/source-units.json'
      - '.github/workflows/verify-source-worker.yml'

# Why: `xtask verify source-worker` is the integrity gate covering dispatch
# cleanliness, NixOS binding drift, ingestor-crate deletion, workspace
# member count, and parser-registration smoke. It existed as local-discipline
# only (issue #1218). Wired here to PRs touching source-worker substrate so
# binding drift surfaces on the changing PR rather than at deploy time on
# sinnix-prime.

jobs:
  verify-source-worker:
    name: xtask verify source-worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/nix-bootstrap
        with:
          cache-name: sinity
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run xtask verify source-worker
        shell: bash
        run: |
          nix develop --accept-flake-config --no-pure-eval --command \
            xtask verify source-worker --format json
