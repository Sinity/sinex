name: Database Checks

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      schema: ${{ steps.filter.outputs.schema }}
    steps:
      - uses: actions/checkout@v5
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            schema:
              - 'schemas/**'
              - 'crate/lib/sinex-primitives/src/events/**'
              - 'crate/lib/sinex-macros/**'
              - 'crate/lib/sinex-schema/**'
              - 'xtask/src/**/*.rs'

  schema_validation:
    name: Schema Validation Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.schema == 'true'
    concurrency:
      group: db-checks-schema-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5

      - name: Prepare cache directories
        run: |
          mkdir -p ~/.cache/sccache
          mkdir -p ~/.cargo/registry
          mkdir -p ~/.cargo/git

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: sccache-${{ runner.os }}-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-git-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-git-${{ runner.os }}-

      - uses: ./.github/actions/nix-bootstrap
        with:
          cache-name: sinity
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run schema-only pipeline
        shell: bash
        run: |
          nix develop --accept-flake-config --no-pure-eval --command bash -lc '
            set -euo pipefail
            xtask ci postgres -- xtask ci schema-only
          '
