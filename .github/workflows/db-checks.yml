name: Database Checks

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      schema: ${{ steps.filter.outputs.schema }}
      sqlx: ${{ steps.filter.outputs.sqlx }}
    steps:
      - uses: actions/checkout@v5
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            schema:
              - 'schemas/**'
              - 'crate/lib/sinex-core/src/types/events/**'
              - 'crate/lib/sinex-schema/**'
              - 'xtask/src/main.rs'
            sqlx:
              - '.sqlx/**'
              - 'crate/**/migrations/**'
              - 'crate/lib/sinex-schema/**'
              - 'crate/**/*.rs'
              - '**/*.sql'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'xtask/src/main.rs'

  schema_validation:
    name: Schema Validation Pipeline
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.schema == 'true'
    concurrency:
      group: db-checks-schema-${{ github.ref }}
      cancel-in-progress: true
    env:
      DEVENV_ROOT: ${{ github.workspace }}
      DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
    steps:
      - uses: actions/checkout@v5

      - name: Prepare cache directories
        run: |
          mkdir -p ~/.cache/sccache
          mkdir -p ~/.cargo/registry
          mkdir -p ~/.cargo/git

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: sccache-${{ runner.os }}-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-git-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-git-${{ runner.os }}-

      - uses: ./.github/actions/nix-bootstrap
        with:
          cache-name: sinity
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run schema sync
        shell: bash
        run: |
          nix develop --accept-flake-config --no-pure-eval --command bash -lc '
            set -euo pipefail
            unset SQLX_OFFLINE || true

            script="$(mktemp)"
            cat >"$script" <<'"'"'EOS'"'"'
            set -euo pipefail

            cargo run --manifest-path crate/lib/sinex-schema/Cargo.toml --bin sinex-schema -- up
            cargo xtask schema check-ready

            psql -h "$PGHOST" -p "$PGPORT" -U sinity -d sinex_dev -v ON_ERROR_STOP=1 -c "INSERT INTO sinex_schemas.event_payload_schemas (source, event_type, schema_version, schema_content, content_hash) VALUES ('test.source', 'test.event', '1.0.0', '{}'::jsonb, md5(random()::text)) ON CONFLICT (source, event_type, schema_version) DO NOTHING;"
            psql -h "$PGHOST" -p "$PGPORT" -U sinity -d sinex_dev -v ON_ERROR_STOP=1 -c "UPDATE sinex_schemas.event_payload_schemas SET is_active = true WHERE source = 'test.source' AND event_type = 'test.event';"
            psql -h "$PGHOST" -p "$PGPORT" -U sinity -d sinex_dev -v ON_ERROR_STOP=1 -c "SELECT COUNT(*) FROM sinex_schemas.event_payload_schemas WHERE source = 'test.source';"

            TMP_DIR="$(mktemp -d)"
            cargo run -p sinex-core --bin sinex-schema --features schema-manager -- generate --output "$TMP_DIR" --sync
EOS
            chmod +x "$script"

            cargo xtask ci postgres -- bash "$script"
          '

  sqlx_validation:
    name: SQLx Validation
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.sqlx == 'true'
    concurrency:
      group: db-checks-sqlx-${{ github.ref }}
      cancel-in-progress: true
    env:
      DEVENV_ROOT: ${{ github.workspace }}
      DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
    steps:
      - uses: actions/checkout@v5

      - name: Prepare cache directories
        run: |
          mkdir -p ~/.cache/sccache
          mkdir -p ~/.cargo/registry
          mkdir -p ~/.cargo/git

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: sccache-${{ runner.os }}-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: cargo-git-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-git-${{ runner.os }}-

      - uses: ./.github/actions/nix-bootstrap
        with:
          cache-name: sinity
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Verify SQLx metadata and offline checks
        shell: bash
        run: |
          nix develop --accept-flake-config --no-pure-eval --command bash -lc '
            set -euo pipefail

            script="$(mktemp)"
            cat >"$script" <<'"'"'EOS'"'"'
            set -euo pipefail
            cargo run --manifest-path crate/lib/sinex-schema/Cargo.toml --bin sinex-schema -- up
            cargo xtask sqlx-prepare
EOS
            chmod +x "$script"

            cargo xtask ci postgres -- bash "$script"
            if git diff --quiet .sqlx; then
              echo "✅ SQLx metadata matches repository"
            else
              echo "::error::SQLx metadata is out of date. Run '\''cargo xtask sqlx-prepare'\'' locally and commit the results."
              git status -sb .sqlx
              git diff .sqlx || true
              exit 1
            fi

            export CARGO_TARGET_DIR=\"$PWD/target-sqlx-offline\"
            SQLX_OFFLINE=1 cargo check --workspace --all-features
            rm -rf \"$CARGO_TARGET_DIR\"
          '
