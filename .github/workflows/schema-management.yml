name: Schema Management

on:
  push:
    branches: [ master, 'claude/**' ]
    paths:
      - 'crate/sinex-events/src/**/*.rs'
      - 'schemas/**/*.json'
      - '.github/workflows/schema-management.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'crate/sinex-events/src/**/*.rs'
      - 'schemas/**/*.json'
      - '.github/workflows/schema-management.yml'

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install ajv-cli for schema validation
        run: npm install -g ajv-cli ajv-formats
        
      - name: Validate all schemas
        run: |
          echo "Validating JSON schemas..."
          find schemas -name "*.json" -type f | while read schema; do
            echo "Validating: $schema"
            ajv compile -s "$schema" --spec=draft7 --strict=false
          done

  generate-schemas:
    name: Generate Schemas from Code
    runs-on: ubuntu-latest
    needs: validate-schemas
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
            
      - name: Setup Nix cache
        uses: cachix/cachix-action@v12
        with:
          name: sinex
          skipPush: true
          
      - name: Generate schemas
        run: |
          nix develop --command cargo run --package sinex-events --bin generate-schemas
          
      - name: Check for schema changes
        id: check-changes
        run: |
          if git diff --quiet schemas/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No schema changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Schema changes detected:"
            git diff --name-status schemas/
          fi
          
      - name: Commit schema changes
        if: steps.check-changes.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add schemas/
          git commit -m "chore: update generated schemas [skip ci]"
          git push

  check-compatibility:
    name: Check Schema Compatibility
    runs-on: ubuntu-latest
    needs: generate-schemas
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install json-schema-diff
        run: npm install -g json-schema-diff
        
      - name: Check backward compatibility
        run: |
          echo "Checking schema backward compatibility..."
          BASE_BRANCH="${{ github.base_ref }}"
          
          # Get list of schema files that exist in both branches
          git ls-tree -r origin/$BASE_BRANCH --name-only | grep "^schemas/.*\.json$" | while read schema_path; do
            if [ -f "$schema_path" ]; then
              echo "Checking compatibility for: $schema_path"
              
              # Get schema from base branch
              git show origin/$BASE_BRANCH:$schema_path > /tmp/base_schema.json
              
              # Compare schemas
              if ! json-schema-diff /tmp/base_schema.json $schema_path; then
                echo "⚠️  Breaking change detected in $schema_path"
                echo "Consider incrementing the schema version if this is intentional"
                exit 1
              fi
            fi
          done
          
          echo "✅ All schema changes are backward compatible"

  deploy-schemas:
    name: Deploy Schemas to Database
    runs-on: ubuntu-latest
    needs: [validate-schemas, generate-schemas]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
            
      - name: Deploy schemas
        run: |
          echo "🚀 Deploying schemas to production database..."
          echo "Note: This step requires the deployment script to be implemented"
          # nix develop --command ./scripts/deploy-schemas.sh