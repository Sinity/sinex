name: Schema Management

on:
  push:
    branches: [ master, 'claude/**' ]
    paths:
      - 'crate/lib/sinex-core/src/types/events/**/*.rs'
      - 'schemas/**/*.json'
      - 'scripts/schema-dev.sh'
      - '.github/workflows/schema-management.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'crate/lib/sinex-core/src/types/events/**/*.rs'
      - 'schemas/**/*.json'
      - 'scripts/schema-dev.sh'
      - '.github/workflows/schema-management.yml'

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install ajv-cli for schema validation
        run: npm install -g ajv-cli ajv-formats
        
      - name: Validate all schemas
        run: |
          echo "Validating JSON schemas..."
          find schemas -name "*.json" -type f | while read schema; do
            echo "Validating: $schema"
            ajv compile -s "$schema" --spec=draft7 --strict=false
          done

  generate-schemas:
    name: Generate Schemas from Code
    runs-on: ubuntu-latest
    needs: validate-schemas
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
            
      - name: Setup Nix cache
        uses: cachix/cachix-action@v12
        with:
          name: sinex
          skipPush: true
          
      - name: Generate schemas via CLI
        run: |
          nix develop --command ./scripts/schema-dev.sh generate
          
      - name: Check for schema changes
        id: check-changes
        run: |
          if git diff --quiet schemas/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No schema changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Schema changes detected:"
            git diff --name-status schemas/
          fi
          
      - name: Commit schema changes
        if: steps.check-changes.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add schemas/
          git commit -m "chore: update generated schemas [skip ci]"
          git push

  deploy-schemas:
    name: Deploy Schemas to Database
    runs-on: ubuntu-latest
    needs: [validate-schemas, generate-schemas]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && secrets.SINEX_PROD_DATABASE_URL != ''
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
            
      - name: Deploy schemas
        env:
          DATABASE_URL: ${{ secrets.SINEX_PROD_DATABASE_URL }}
        run: |
          nix develop --command ./scripts/deploy-schemas.sh
