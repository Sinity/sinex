name: Schema Management

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ master, 'claude/**' ]
    paths:
      - 'crate/lib/sinex-core/src/types/events/**/*.rs'
      - 'schemas/**/*.json'
      - 'xtask/src/main.rs'
      - '.github/workflows/schema-management.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'crate/lib/sinex-core/src/types/events/**/*.rs'
      - 'schemas/**/*.json'
      - 'xtask/src/main.rs'
      - '.github/workflows/schema-management.yml'

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    concurrency:
      group: schema-management-validate-${{ github.ref }}
      cancel-in-progress: true
    env:
      DEVENV_ROOT: ${{ github.workspace }}
      DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: npm-global-ajv-${{ runner.os }}
          restore-keys: npm-global-ajv-${{ runner.os }}-
      
      - name: Configure npm prefix
        run: |
          npm config set prefix ~/.npm-global
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install ajv-cli for schema validation
        run: npm install -g ajv-cli ajv-formats
        
      - name: Validate all schemas
        run: |
          echo "Validating JSON schemas..."
          find schemas -name "*.json" -type f | while read schema; do
            echo "Validating: $schema"
            ajv compile -s "$schema" --spec=draft7 --strict=false
          done

  generate-schemas:
    name: Generate Schemas from Code
    runs-on: ubuntu-latest
    needs: validate-schemas
    concurrency:
      group: schema-management-generate-${{ github.ref }}
      cancel-in-progress: true
    env:
      DEVENV_ROOT: ${{ github.workspace }}
      DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/nix-bootstrap
        with:
          cache-name: sinity
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Generate schemas via CLI
        shell: bash
        run: |
          scripts/ci-devenv.sh bash <<'DEVENV'
          set -euo pipefail
          scripts/ci-postgres.sh <<'POSTGRES'
          set -euo pipefail
          DATABASE_URL="$DATABASE_URL_SUPERUSER" \
            cargo run \
              --manifest-path crate/lib/sinex-schema/Cargo.toml \
              --bin sinex-schema -- \
              up
          cargo xtask schema check-ready
          cargo xtask schema generate
          POSTGRES
          DEVENV
          
      - name: Check for schema changes
        id: check-changes
        run: |
          if git diff --quiet schemas/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No schema changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Schema changes detected:"
            git diff --name-status schemas/
          fi
          
      - name: Open schema update PR
        if: steps.check-changes.outputs.changed == 'true' && github.event_name == 'push'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update generated schemas"
          title: "chore: update generated schemas"
          body: |
            Automated schema refresh generated by GitHub Actions.

            Please review the changes to the files under `schemas/`.
          base: master
          branch: chore/update-schemas-${{ github.run_id }}
          delete-branch: true

  deploy-schemas:
    name: Deploy Schemas to Database
    runs-on: ubuntu-latest
    needs: [validate-schemas, generate-schemas]
    env:
      PROD_DATABASE_URL: ${{ secrets.SINEX_PROD_DATABASE_URL }}
      DEVENV_ROOT: ${{ github.workspace }}
      DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    concurrency:
      group: schema-management-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        env:
          DEVENV_ROOT: ${{ github.workspace }}
          DEVENV_DOTFILE: ${{ github.workspace }}/.devenv

      - uses: ./.github/actions/nix-bootstrap
        with:
          cache-name: sinity
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Check production database secret
        id: prod-secret
        shell: bash
        env:
          PROD_DATABASE_URL: ${{ secrets.SINEX_PROD_DATABASE_URL }}
        run: |
          if [ -z "$PROD_DATABASE_URL" ]; then
            echo "SINEX_PROD_DATABASE_URL is not configured; skipping deploy."
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy schemas
        if: steps.prod-secret.outputs.has_secret == 'true'
        env:
          DATABASE_URL: ${{ secrets.SINEX_PROD_DATABASE_URL }}
          SQLX_OFFLINE: '1'
        shell: bash
        run: |
          scripts/ci-devenv.sh bash -lc 'set -euo pipefail; cargo xtask schema deploy'
