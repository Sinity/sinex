name: Schema Management

on:
  push:
    branches: [ master, 'claude/**' ]
    paths:
      - 'crate/lib/sinex-core/src/types/events/**/*.rs'
      - 'schemas/**/*.json'
      - 'scripts/schema-dev.sh'
      - '.github/workflows/schema-management.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'crate/lib/sinex-core/src/types/events/**/*.rs'
      - 'schemas/**/*.json'
      - 'scripts/schema-dev.sh'
      - '.github/workflows/schema-management.yml'

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    concurrency:
      group: schema-management-validate-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: npm-global-ajv-${{ runner.os }}
          restore-keys: npm-global-ajv-${{ runner.os }}-
      
      - name: Configure npm prefix
        run: |
          npm config set prefix ~/.npm-global
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install ajv-cli for schema validation
        run: npm install -g ajv-cli ajv-formats
        
      - name: Validate all schemas
        run: |
          echo "Validating JSON schemas..."
          find schemas -name "*.json" -type f | while read schema; do
            echo "Validating: $schema"
            ajv compile -s "$schema" --spec=draft7 --strict=false
          done

  generate-schemas:
    name: Generate Schemas from Code
    runs-on: ubuntu-latest
    needs: validate-schemas
    concurrency:
      group: schema-management-generate-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/nix-bootstrap
        with:
          cache-name: sinity
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          install-devenv: "false"
          
      - name: Generate schemas via CLI
        run: |
          nix develop --command ./scripts/schema-dev.sh generate
          
      - name: Check for schema changes
        id: check-changes
        run: |
          if git diff --quiet schemas/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No schema changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Schema changes detected:"
            git diff --name-status schemas/
          fi
          
      - name: Open schema update PR
        if: steps.check-changes.outputs.changed == 'true' && github.event_name == 'push'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update generated schemas"
          title: "chore: update generated schemas"
          body: |
            Automated schema refresh generated by GitHub Actions.

            Please review the changes to the files under `schemas/`.
          base: master
          branch: chore/update-schemas-${{ github.run_id }}
          delete-branch: true

  deploy-schemas:
    name: Deploy Schemas to Database
    runs-on: ubuntu-latest
    needs: [validate-schemas, generate-schemas]
    env:
      PROD_DATABASE_URL: ${{ secrets.SINEX_PROD_DATABASE_URL }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && env.PROD_DATABASE_URL != ''
    concurrency:
      group: schema-management-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/nix-bootstrap
        with:
          cache-name: sinity
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          install-devenv: "false"
            
      - name: Deploy schemas
        env:
          DATABASE_URL: ${{ secrets.SINEX_PROD_DATABASE_URL }}
        run: |
          nix develop --command ./scripts/deploy-schemas.sh
