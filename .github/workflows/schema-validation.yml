name: Schema Validation Pipeline

on:
  push:
    paths:
      - 'schemas/**'
      - 'crate/lib/sinex-core/src/types/events/**'
      - 'crate/lib/sinex-schema/**'
      - 'scripts/schema-dev.sh'
      - '.github/workflows/schema-validation.yml'
  pull_request:
    paths:
      - 'schemas/**'
      - 'crate/lib/sinex-core/src/types/events/**'
      - 'crate/lib/sinex-schema/**'
      - 'scripts/schema-dev.sh'
      - '.github/workflows/schema-validation.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: timescale/timescaledb:2.15.2-pg16  # Keep validation jobs in lock-step with the pinned CI version
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sinex_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7
      
      - name: Install PostgreSQL extensions
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          
          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          
          # Install required extensions
          PGPASSWORD=postgres psql -h localhost -U postgres -d sinex_test -c "
            CREATE EXTENSION IF NOT EXISTS pgx_ulid CASCADE;
            CREATE EXTENSION IF NOT EXISTS pg_jsonschema CASCADE;
            CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;
            CREATE EXTENSION IF NOT EXISTS pgvector CASCADE;
          " || echo "Extensions installation completed with warnings"
      
      - name: Run database migrations
        run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/sinex_test"
          cd crate/lib/sinex-schema
          nix develop -c cargo run -- up
      
      - name: Test schema registry functionality
        run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/sinex_test"
          
          # Test that schema registry table exists and works
          PGPASSWORD=postgres psql -h localhost -U postgres -d sinex_test -c "
            -- Test schema insertion
            INSERT INTO sinex_schemas.event_payload_schemas 
            (source, event_type, schema_version, schema_content, content_hash)
            VALUES 
            ('test.source', 'test.event', '1.0.0', '{}'::jsonb, md5(random()::text));
            
            -- Test schema activation
            UPDATE sinex_schemas.event_payload_schemas 
            SET is_active = true 
            WHERE source = 'test.source' AND event_type = 'test.event';
            
            -- Verify schema exists
            SELECT COUNT(*) FROM sinex_schemas.event_payload_schemas 
            WHERE source = 'test.source';
          "

      - name: Smoke-test schema CLI
        run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/sinex_test"
          TMP_DIR=$(mktemp -d)
          nix develop -c cargo run -p sinex-core --bin sinex-schema --features schema-manager -- generate --output "$TMP_DIR" --sync

  deploy-staging:
    runs-on: ubuntu-latest
    needs: validate-schemas
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Auto-registration deployment note
        run: |
          echo "📋 Schema auto-registration system is active"
          echo "🚀 Schemas are automatically generated from Rust types via #[derive(JsonSchema)]"
          echo "✅ No manual deployment needed - schemas are embedded in the application"
