name: Schema Validation Pipeline

on:
  push:
    paths:
      - 'schemas/**'
      - 'crate/lib/sinex-core/src/types/events/**'
      - 'crate/lib/sinex-schema/**'
      - 'scripts/schema-dev.sh'
      - '.github/workflows/schema-validation.yml'
  pull_request:
    paths:
      - 'schemas/**'
      - 'crate/lib/sinex-core/src/types/events/**'
      - 'crate/lib/sinex-schema/**'
      - 'scripts/schema-dev.sh'
      - '.github/workflows/schema-validation.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-schemas:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v16
        with:
          name: sinity
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Install devenv.sh
        shell: bash
        run: nix profile install nixpkgs#devenv

      - name: Validate schemas inside Nix
        shell: 'nix develop --no-pure-eval --command bash --noprofile --norc -euo pipefail {0}'
        env:
          DEVENV_ROOT: ${{ github.workspace }}
          DEVENV_DOTFILE: ${{ github.workspace }}/.devenv
        run: |
          export PGDATA="$PWD/postgres_data"
          rm -rf "$PGDATA"
          mkdir -p "$PGDATA"
          initdb --auth=trust --no-locale --encoding=UTF8
          echo "unix_socket_directories = '$PWD'" >> "$PGDATA/postgresql.conf"
          pg_ctl start -l postgres.log -o "-k $PWD"
          trap 'pg_ctl stop' EXIT

          SUPERUSER=$(id -un)
          PGUSER="$SUPERUSER" psql -h "$PWD" -d postgres -v ON_ERROR_STOP=1 -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'sinity') THEN CREATE ROLE sinity LOGIN CREATEDB; END IF; END \$\$;"
          PGUSER="$SUPERUSER" psql -h "$PWD" -d postgres -v ON_ERROR_STOP=1 -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'sinex_dev') THEN CREATE DATABASE sinex_dev OWNER sinity; END IF; END \$\$;"

          export PGHOST="$PWD"
          export DATABASE_URL="postgresql:///sinex_dev?host=$PWD"

          pushd crate/lib/sinex-schema >/dev/null
          cargo run -- up
          popd

          psql -h "$PGHOST" -U sinity -d sinex_dev -v ON_ERROR_STOP=1 -c "INSERT INTO sinex_schemas.event_payload_schemas (source, event_type, schema_version, schema_content, content_hash) VALUES ('test.source', 'test.event', '1.0.0', '{}'::jsonb, md5(random()::text)) ON CONFLICT (source, event_type, schema_version) DO NOTHING;"
          psql -h "$PGHOST" -U sinity -d sinex_dev -v ON_ERROR_STOP=1 -c "UPDATE sinex_schemas.event_payload_schemas SET is_active = true WHERE source = 'test.source' AND event_type = 'test.event';"
          psql -h "$PGHOST" -U sinity -d sinex_dev -v ON_ERROR_STOP=1 -c "SELECT COUNT(*) FROM sinex_schemas.event_payload_schemas WHERE source = 'test.source';"

          TMP_DIR=$(mktemp -d)
          cargo run -p sinex-core --bin sinex-schema --features schema-manager -- generate --output "$TMP_DIR" --sync

  deploy-staging:
    runs-on: ubuntu-latest
    needs: validate-schemas
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Auto-registration deployment note
        run: |
          echo "📋 Schema auto-registration system is active"
          echo "🚀 Schemas are automatically generated from Rust types via #[derive(JsonSchema)]"
          echo "✅ No manual deployment needed - schemas are embedded in the application"
