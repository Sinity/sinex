[workspace]
members = [
    "crate/sinex-core",
    "crate/sinex-ulid",
    "crate/sinex-db", 
    "crate/sinex-worker",
    "crate/sinex-promo-worker",
    "crate/sinex-events-terminal",
    "crate/sinex-events-desktop",
    "crate/sinex-events-system", 
    "crate/sinex-events-fs",
    "crate/sinex-collector",
    "crate/sinex-annex",
    "crate/sinex-health-aggregator",
    "crate/sinex-preflight",
    "crate/sinex-test-macros",
    "crate/sinex-services",
    "crate/sinex-config",
]
resolver = "2"

[package]
name = "sinex"
version.workspace = true
edition.workspace = true
authors.workspace = true

[[test]]
name = "tests"
path = "test/mod.rs"


[dependencies]
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
uuid.workspace = true
chrono.workspace = true
tracing.workspace = true
sqlx.workspace = true
async-trait.workspace = true
gethostname.workspace = true

# Local crate dependencies
sinex-core = { path = "crate/sinex-core" }
sinex-db = { path = "crate/sinex-db" }
sinex-ulid = { path = "crate/sinex-ulid", features = ["arbitrary"] }
sinex-events-terminal = { path = "crate/sinex-events-terminal" }
sinex-events-desktop = { path = "crate/sinex-events-desktop" }
sinex-events-system = { path = "crate/sinex-events-system" }
sinex-events-fs = { path = "crate/sinex-events-fs" }
sinex-worker = { path = "crate/sinex-worker" }
sinex-collector = { path = "crate/sinex-collector" }
sinex-annex = { path = "crate/sinex-annex" }

# Testing dependencies needed for integration tests
futures = "0.3"
toml = "0.8"
tempfile = "3.10"
rand = "0.8"
lazy_static = "1.4"
fastrand = "2.0"
jsonschema = "0.17"
schemars = { workspace = true }

# Example dependencies
tracing-subscriber = { workspace = true }

[features]
default = []
arbitrary = ["sinex-ulid/arbitrary"]

[dev-dependencies]
proptest.workspace = true
tempfile = "3"
rusqlite = { version = "0.30", features = ["bundled"] }
sinex-events-terminal = { path = "crate/sinex-events-terminal" }
sinex-events-desktop = { path = "crate/sinex-events-desktop" }
sinex-events-system = { path = "crate/sinex-events-system" }
sinex-events-fs = { path = "crate/sinex-events-fs" }
sinex-test-macros = { path = "crate/sinex-test-macros" }
criterion.workspace = true
pretty_assertions = "1.4"
serial_test = "3.0"
test-case = "3.3"
rstest = "0.18"
num_cpus = "1.16"
ctor = "0.2"
once_cell = "1"
ctrlc = "3"

[workspace.package]
version = "0.4.2"
edition = "2021"
authors = ["Sinex Exocortex Contributors"]
repository = "https://github.com/sinex/exocortex"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Database
sqlx = { version = "0.7", features = ["runtime-tokio", "postgres", "uuid", "chrono", "json", "migrate"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Error handling
anyhow = "1"
thiserror = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# IDs and time
ulid = { version = "1", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# HTTP and metrics
axum = "0.7"
prometheus = "0.13"

# Utils
rand = "0.8"
once_cell = "1"
blake3 = "1"
glob = "0.3"

# Testing
proptest = "1"
criterion = "0.5"
fastrand = "2.0"

# System
gethostname = "0.4"
clap = { version = "4", features = ["derive", "env"] }
which = "5.0"
tempfile = "3.0"

# Configuration and validation
regex = "1"
url = "2"
jsonschema = "0.17"
unicode-normalization = "0.1"
schemars = "0.8"
dirs = "5.0"
