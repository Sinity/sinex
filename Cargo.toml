[workspace]
members = [
  "crate/sinex",
  "crate/sinex-db",
  "crate/sinex-db/migration",
  "crate/sinex-events",
  "crate/sinex-annex",
  "crate/sinex-health-aggregator",
  "crate/sinex-preflight",
  "crate/sinex-services",
  "crate/sinex-macros",
  "crate/sinex-gateway",
  "crate/sinex-satellite-sdk",
  "crate/sinex-ingestd",
  "crate/sinex-fs-watcher",
  "crate/sinex-terminal-command-canonicalizer",
  "crate/sinex-terminal-satellite",
  "crate/sinex-desktop-satellite",
  "crate/sinex-system-satellite",
  "crate/sinex-document-ingestor",
  # Phase 3: NATS JetStream integration
  "crate/sinex-nats",
  # Service automata (Phase 4: Gateway dissolution)
  "crate/sinex-analytics-automaton",
  "crate/sinex-pkm-automaton",
  "crate/sinex-search-automaton",
  "crate/sinex-content-automaton",
  "crate/sinex-rpc-dispatcher",
  # New consolidated crates (replacing sinex-core split)
  "crate/sinex-types",
  "crate/sinex-telemetry",
  # Test infrastructure
  "crate/sinex-test-utils",
  # Schema management - temporarily disabled due to compilation issues
  # "crate/sinex-schema-manager",
]
resolver = "2"

# Clippy configuration for zero warnings enforcement
[workspace.lints.clippy]
# Treat all clippy warnings as errors for production code
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
# Allow some pedantic lints that are too noisy
module_name_repetitions = "allow"
similar_names = "allow"
too_many_lines = "allow"
# Specific lints we want to enforce strictly
too_many_arguments = "deny"
type_complexity = "deny"
cognitive_complexity = "warn"


[workspace.package]
version = "0.4.2"
edition = "2021"
authors = ["Sinex Exocortex Contributors"]
repository = "https://github.com/sinex/exocortex"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.47", features = ["full"] }
async-trait = "0.1.88"

# Database
sqlx = { version = "0.8", default-features = false, features = [
  "runtime-tokio-rustls",
  "postgres",
  "uuid",
  "chrono",
  "json",
  "macros",
  "migrate",
  "bigdecimal",
] }

# Serialization
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.141"

# Error handling
anyhow = "1.0.98"
thiserror = "2.0.12"
color-eyre = "0.6.5"
serde_path_to_error = "0.1.17"

# Logging
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["env-filter", "json"] }

# IDs and time
ulid = { version = "1.2.1", features = ["serde"] }
uuid = { version = "1.17.0", features = ["v4", "serde"] }
chrono = { version = "0.4.41", features = ["serde"] }

# HTTP and metrics
axum = "0.7"

# Utils
rand = "0.8"
once_cell = "1.21.3"
blake3 = "1.8.2"
glob = "0.3"
toml = "0.8"
fastrand = "2.0"

# Builder pattern
bon = "2.3"

# Retry logic
tokio-retry = "0.3"

# gRPC and protocol buffers
tonic = "0.11"
prost = "0.12"
tonic-build = "0.11"

# Redis for message bus
redis = { version = "0.24", features = ["tokio-comp", "streams"] }

# System integration
sd-notify = "0.4"

# Additional utilities
tokio-stream = "0.1"
futures = "0.3"
dirs = "5.0"

# File system watching
notify = "6.1"

# Testing
proptest = "1"

# System
gethostname = "0.4"
clap = { version = "4.5.42", features = ["derive", "env"] }
which = "5.0"

# Configuration and validation
regex = "1.11.1"
url = "2"
unicode-normalization = "0.1"
schemars = "0.8"
tempfile = "3.0"
jsonschema = "0.17"
validator = { version = "0.18", features = ["derive"] }
figment = { version = "0.10.19", features = ["toml", "yaml", "json", "env"] }
humantime-serde = "1.1"

# Build-time registry
inventory = "0.3"

# Cryptography
sha2 = "0.10"
hex = "0.4"

# Database (for Atuin integration)
rusqlite = { version = "0.32.1", features = ["bundled"] }

# Speed-optimized profiles for development
[profile.dev]
# Fast compilation for development
opt-level = 0
debug = true
split-debuginfo = "unpacked" # Faster debug info handling
incremental = true
codegen-units = 256          # Maximum parallelism for fast compilation
