[workspace]
members = [
    "crate/sinex-core",
    "crate/sinex-ulid",
    "crate/sinex-db", 
    "crate/sinex-worker",
    "crate/sinex-promo-worker",
    "crate/sinex-events",
    "crate/sinex-collector",
    "crate/sinex-annex",
]
resolver = "2"

[package]
name = "sinex"
version.workspace = true
edition.workspace = true
authors.workspace = true

[[test]]
name = "integration"
path = "test/mod.rs"

[[test]]
name = "property_tests"
path = "test/property/work_queue_property_tests.rs"


[dependencies]
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
uuid.workspace = true
chrono.workspace = true
tracing.workspace = true
sqlx.workspace = true
async-trait.workspace = true
gethostname.workspace = true

# Testing dependencies needed for integration tests
futures = "0.3"
toml = "0.8"

# Example dependencies
tracing-subscriber = { workspace = true }

# Local dependencies  
sinex-core = { path = "crate/sinex-core" }
sinex-db = { path = "crate/sinex-db" }
sinex-ulid = { path = "crate/sinex-ulid" }
sinex-worker = { path = "crate/sinex-worker" }
sinex-collector = { path = "crate/sinex-collector" }
sinex-annex = { path = "crate/sinex-annex" }
sinex-events = { path = "crate/sinex-events" }

[dev-dependencies]
proptest.workspace = true
tempfile = "3"
rusqlite = { version = "0.30", features = ["bundled"] }
sinex-events = { path = "crate/sinex-events" }

[workspace.package]
version = "0.4.2"
edition = "2021"
authors = ["Sinex Exocortex Contributors"]
repository = "https://github.com/sinex/exocortex"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Database
sqlx = { version = "0.7", features = ["runtime-tokio", "postgres", "uuid", "chrono", "json", "migrate"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"
thiserror = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# IDs and time
ulid = { version = "1", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# HTTP and metrics
axum = "0.7"
prometheus = "0.13"

# Utils
rand = "0.8"
once_cell = "1"
blake3 = "1"
glob = "0.3"

# Testing
proptest = "1"
criterion = "0.5"

# System
gethostname = "0.4"
clap = { version = "4", features = ["derive", "env"] }
which = "5.0"
tempfile = "3.0"
