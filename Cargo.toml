[workspace]
members = [
    "src/sinex-ulid",
    "src/sinex-db", 
    "src/sinex-worker",
    "src/sinex-promo-worker",
    "ingestors/shared",
    "ingestors/hyprland",
    "ingestors/kitty",
    "ingestors/filesystem",
]
resolver = "2"

[workspace.package]
version = "0.3.0"
edition = "2021"
authors = ["Sinex Exocortex Contributors"]
repository = "https://github.com/sinex/exocortex"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Database
sqlx = { version = "0.7", features = ["runtime-tokio", "postgres", "uuid", "chrono", "json"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"
thiserror = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# IDs and time
ulid = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# HTTP and metrics
axum = "0.7"
prometheus = "0.13"

# Utils
rand = "0.8"
once_cell = "1"

# Testing
proptest = "1"
criterion = "0.5"

# System
gethostname = "0.4"
clap = { version = "4", features = ["derive", "env"] }