[workspace]
members = [
    "crate/sinex-ulid",
    "crate/sinex-db", 
    "crate/sinex-events",
    "crate/sinex-validation",
    "crate/sinex-service-base",
    "crate/sinex-identifiers",
    "crate/sinex-annex",
    "crate/sinex-health-aggregator",
    "crate/sinex-preflight",
    "crate/sinex-test-macros",
    "crate/sinex-macros",
    "crate/sinex-services",
    "crate/sinex-config",
    "crate/sinex-gateway",
    "crate/sinex-satellite-sdk",
    "crate/sinex-ingestd",
    "crate/sinex-fs-watcher",
    "crate/sinex-terminal-command-canonicalizer",
    "crate/sinex-terminal-satellite",
    "crate/sinex-desktop-satellite",
    "crate/sinex-system-satellite",
    # Service automata (Phase 4: Gateway dissolution)
    "crate/sinex-analytics-automaton",
    "crate/sinex-pkm-automaton",
    "crate/sinex-search-automaton",
    "crate/sinex-content-automaton",
    "crate/sinex-rpc-dispatcher",
    # New consolidated crates (replacing sinex-core split)
    "crate/sinex-core-types",
    "crate/sinex-core-utils",
    "crate/sinex-core-runtime",
    "crate/sinex-core-fs",
    "crate/sinex-metrics-lib",
]
resolver = "2"

# Clippy configuration for zero warnings enforcement
[workspace.lints.clippy]
# Treat all clippy warnings as errors for production code
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
# Allow some pedantic lints that are too noisy
module_name_repetitions = "allow"
similar_names = "allow"
too_many_lines = "allow"
# Specific lints we want to enforce strictly
too_many_arguments = "deny"
type_complexity = "deny"
cognitive_complexity = "warn"

[package]
name = "sinex"
version.workspace = true
edition.workspace = true
authors.workspace = true

[[test]]
name = "tests"
path = "test/mod.rs"


[dependencies]
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
uuid.workspace = true
chrono.workspace = true
tracing.workspace = true
sqlx.workspace = true
async-trait.workspace = true
gethostname.workspace = true

# Local crate dependencies
sinex-core-types = { path = "crate/sinex-core-types" }
sinex-core-utils = { path = "crate/sinex-core-utils" }
sinex-core-runtime = { path = "crate/sinex-core-runtime" }
sinex-core-fs = { path = "crate/sinex-core-fs" }
sinex-db = { path = "crate/sinex-db" }
sinex-ulid = { path = "crate/sinex-ulid", features = ["arbitrary"] }
sinex-events = { path = "crate/sinex-events" }
sinex-annex = { path = "crate/sinex-annex" }
sinex-preflight = { path = "crate/sinex-preflight" }
sinex-gateway = { path = "crate/sinex-gateway" }
sinex-satellite-sdk = { path = "crate/sinex-satellite-sdk" }
sinex-error = { path = "crate/sinex-error" }
sinex-validation = { path = "crate/sinex-validation" }
sinex-channel = { path = "crate/sinex-channel" }
sinex-config = { path = "crate/sinex-config" }

# Testing dependencies needed for integration tests
lazy_static = "1.4"

# Example dependencies
tracing-subscriber = { workspace = true }

[features]
default = []
arbitrary = ["sinex-ulid/arbitrary"]
metrics = []

[dev-dependencies]
proptest.workspace = true
tempfile.workspace = true
rusqlite = { version = "0.30", features = ["bundled"] }
sinex-test-macros = { path = "crate/sinex-test-macros" }
criterion.workspace = true
pretty_assertions = "1.4"
serial_test = "3.0"
test-case = "3.3"
rstest = "0.18"
num_cpus = "1.16"
ctor = "0.2"
parking_lot = "0.12"
once_cell.workspace = true
toml.workspace = true
fastrand.workspace = true
rand.workspace = true
futures.workspace = true
jsonschema.workspace = true
ctrlc = "3"
reqwest = { version = "0.11", features = ["json"] }
tower = "0.4"
tower-http = "0.4"
# Test dependencies needed for integration tests
redis.workspace = true
tonic.workspace = true
tokio-stream.workspace = true
# Additional test-specific dependencies
sinex-services = { path = "crate/sinex-services" }
sinex-ingestd = { path = "crate/sinex-ingestd" }

[workspace.package]
version = "0.4.2"
edition = "2021"
authors = ["Sinex Exocortex Contributors"]
repository = "https://github.com/sinex/exocortex"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Database
sqlx = { version = "0.7", features = ["runtime-tokio", "postgres", "uuid", "chrono", "json", "migrate"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"
thiserror = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# IDs and time
ulid = { version = "1", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# HTTP and metrics
axum = "0.7"

# Utils
rand = "0.8"
once_cell = "1"
blake3 = "1"
glob = "0.3"
toml = "0.8"
fastrand = "2.0"

# gRPC and protocol buffers
tonic = "0.11"
prost = "0.12"
tonic-build = "0.11"

# Redis for message bus
redis = { version = "0.24", features = ["tokio-comp", "streams"] }

# System integration
sd-notify = "0.4"

# Additional utilities
tokio-stream = "0.1"
futures = "0.3"
dirs = "5.0"

# File system watching
notify = "6.1"

# Testing
proptest = "1"
criterion = "0.5"

# System
gethostname = "0.4"
clap = { version = "4", features = ["derive", "env"] }
which = "5.0"

# Configuration and validation
regex = "1"
url = "2"
unicode-normalization = "0.1"
schemars = "0.8"
tempfile = "3.0"
jsonschema = "0.17"

# Database (for Atuin integration)
rusqlite = { version = "0.30", features = ["bundled"] }
