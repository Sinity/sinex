# Filesystem Ingestor Configuration - Development

[database]
url = "postgresql://localhost/sinex_dev"
max_connections = 10
connection_timeout_secs = 30

[logging]
level = "debug"
format = "pretty"
include_location = true

[filesystem]
# Directories to watch for changes
watch_directories = [
    "~/Documents",
    "~/Projects",
    "/tmp/test-watch"
]

# Patterns to exclude from monitoring
exclude_patterns = [
    "*.tmp",
    "*.log",
    "*.cache",
    ".git/**",
    "node_modules/**",
    "__pycache__/**",
    "target/**",
    "*.swp",
    "*.swo",
    "*~"
]

# Patterns to explicitly include (overrides excludes)
include_patterns = []

# Debounce time for filesystem events (milliseconds)
debounce_ms = 500

# Batching configuration
batch_size_events = 50
batch_timeout_ms = 5000

# File hashing
hash_files = true
max_hash_size_bytes = 10485760  # 10MB

# Agent settings
heartbeat_interval_secs = 60
max_retries = 3
retry_delay_secs = 5