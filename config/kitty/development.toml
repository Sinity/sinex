# Kitty Terminal Ingestor Configuration - Development

[database]
url = "postgresql://localhost/sinex_dev"
max_connections = 10
connection_timeout_secs = 30

[logging]
level = "debug"
format = "pretty"
include_location = true

[kitty]
# Polling interval for checking Kitty terminals (seconds)
polling_interval_secs = 5

# Path pattern for Kitty sockets
socket_path = "/tmp/kitty-*"

# Maximum number of windows to track
max_tracked_windows = 100

# Command history options
track_command_history = true
max_command_history_items = 1000

# Agent settings
heartbeat_interval_secs = 60
max_retries = 3
retry_delay_secs = 5