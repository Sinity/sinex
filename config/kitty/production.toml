# Kitty Terminal Ingestor Configuration - Production

[database]
# Use environment variable: DATABASE_URL
url = "${DATABASE_URL}"
max_connections = 50
connection_timeout_secs = 10

[logging]
level = "info"
format = "json"
include_location = false

[kitty]
# Polling interval for checking Kitty terminals (seconds)
polling_interval_secs = 10

# Path pattern for Kitty sockets
# In production, might use XDG_RUNTIME_DIR
socket_path = "${XDG_RUNTIME_DIR}/kitty-*"

# Maximum number of windows to track
max_tracked_windows = 500

# Command history options
track_command_history = true
max_command_history_items = 5000

# Agent settings
heartbeat_interval_secs = 300  # 5 minutes
max_retries = 5
retry_delay_secs = 10