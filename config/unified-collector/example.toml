# Unified Collector Configuration Example
# This demonstrates the event-centric configuration approach

# List of enabled events - this is all you need to get started!
enabled_events = [
    # File events
    "file.created",
    "file.modified",
    "file.deleted",
    
    # Terminal events
    "command.executed",
    "shell.command.executed_atuin",
    "shell.history.command",
    
    # Terminal recording
    "terminal.asciinema.session_started",
    "terminal.asciinema.session_ended",
    "terminal.scrollback.captured",
    "terminal.command_output.captured",
    
    # Window manager events
    "window.focused",
    "window.opened", 
    "window.closed",
    "workspace.changed",
    
    # D-Bus events
    "dbus.signal",
    "dbus.method_call",
    "system.notification",
    "media.playback.changed",
    "system.power.event",
    
    # Periodic state dumps
    "state.snapshot"
]

# Event-specific configuration (optional)
# Uses hierarchical merging: event.category + event.specific_event

# Configuration for all file.* events
[event.files]
watch_patterns = ["~/Documents/**/*", "~/Code/**/*", "/etc/**/*"]
ignore_patterns = [
    "**/target/**",
    "**/.git/**", 
    "**/node_modules/**",
    "**/__pycache__/**",
    "**/*.pyc",
    "**/.*"  # Hidden files
]
debounce_ms = 100
max_depth = 10

# Specific config for file.created (merges with event.files)
[event.file_created]
# Only watch for specific file types being created
watch_patterns = ["**/*.rs", "**/*.py", "**/*.js", "**/*.toml", "**/*.md"]
debounce_ms = 50  # Faster debounce for file creation

# Configuration for command execution tracking
[event.command_executed]
socket_path = "/tmp/kitty"  # Standard Kitty socket location
capture_env_vars = ["PATH", "PWD", "USER", "HOME", "SHELL"]
max_command_length = 4096
# Filter out certain commands from being recorded
ignore_commands = ["ls", "cd", "pwd", "clear"]

# Configuration for Atuin history ingestion
[event.shell_command_executed_atuin]
# Path to Atuin's SQLite database
db_path = "~/.local/share/atuin/history.db"
# How often to poll for new entries (seconds)
polling_interval_secs = 3
# How many entries to process in each batch
batch_size = 100
# Use file watching instead of pure polling (experimental)
use_file_watch = false

# Window manager configuration
[event.windows]
monitored_events = [
    "activewindow",
    "activewindowv2", 
    "openwindow",
    "closewindow",
    "workspace",
    "workspacev2",
    "focusedmon"
]

# State snapshot configuration  
[event.state_snapshot]
# Interval in seconds (300 = 5 minutes, 0 = disabled)
interval_secs = 300
# What to include in snapshots
include_monitors = true
include_workspaces = true
include_clients = true
include_layouts = false  # Hyprland layouts can be large

# Individual window events can have their own config too
[event.window_focused]
# Augment with additional window data from hyprctl
augment_with_details = true
# Track focus history
track_history = true
history_size = 100

# Workspace tracking
[event.workspace_changed]
# Include list of windows in workspace
include_window_list = true
# Track empty workspaces
track_empty = false

# Output configuration (not event-specific)
[output]
# Where to send events
database = true
logging = false  # Set to true for debugging
debug_file = "/tmp/unified-collector-debug.json"  # Optional

# Database configuration (if output.database = true)
[database]
# Uses DATABASE_URL environment variable by default
# url = "postgresql:///sinex_dev?host=/run/postgresql"
max_connections = 10
connection_timeout_secs = 10

# Logging configuration
[logging]
level = "info"  # debug, info, warn, error
format = "pretty"  # pretty, json

# Shell history file monitoring
[event.shell_history_command]
# History files to monitor
history_files = ["~/.zsh_history", "~/.bash_history"]
# Polling interval (seconds)
polling_interval_secs = 10
# Use file watching instead of polling
use_file_watch = true
# Deduplicate commands within this window (seconds)
dedup_window_secs = 300

# Asciinema recording monitoring
[event.terminal_asciinema]
# Directory containing asciinema recordings
recordings_dir = "~/.local/share/asciinema/asciicast"
# File pattern for recordings
file_pattern = "*.cast"
# How often to check for recordings (seconds)
polling_interval_secs = 5
# Auto-start recording in new terminals
auto_start_recording = false

# Terminal scrollback capture
[event.terminal_scrollback]
# Kitty socket path
kitty_socket_path = "/tmp/kitty"
# Capture interval (seconds) - 300 = 5 minutes
capture_interval_secs = 300
# Maximum scrollback lines to capture
max_scrollback_lines = 10000
# Include ANSI escape codes
include_ansi_codes = false
# Capture command output separately (requires shell integration)
capture_command_output = true
# Save scrollback to files
save_to_files = true
# Directory for scrollback files
scrollback_dir = "~/.local/share/sinex/scrollback"

# D-Bus monitoring configuration
[event.dbus]
# Monitor session bus (user events)
monitor_session = true
# Monitor system bus (system events)
monitor_system = true
# Log all signals for debugging
log_all_signals = false
# Extract specific event types
extract_notifications = true
extract_media = true
extract_power = true
# Interfaces to exclude (reduce noise)
exclude_interfaces = [
    "org.freedesktop.DBus.Properties",
    "org.freedesktop.DBus.Introspectable"
]