# AST-grep rules for automated test conversion

rules:
  # Rule 1: Convert manual database setup
  - id: manual-db-setup
    language: rust
    pattern: |
      async fn $FUNC() -> $RET {
        let $URL = std::env::var("DATABASE_URL")$$$;
        let $POOL = create_test_pool($$$).await?;
        $$$
        Ok($POOL)
      }
    fix: |
      async fn $FUNC() -> $RET {
        common::create_test_db_pool().await
      }
    message: Use common::create_test_db_pool() instead of manual setup

  # Rule 2: Convert manual event creation
  - id: manual-raw-event
    language: rust
    pattern: |
      RawEvent {
        id: $ID,
        source: $SOURCE,
        event_type: $TYPE,
        ts_ingest: $TS_INGEST,
        ts_orig: $TS_ORIG,
        host: $HOST,
        ingestor_version: $VERSION,
        payload_schema_id: $SCHEMA,
        payload: $PAYLOAD,
      }
    fix: |
      RawEventBuilder::new($SOURCE, $TYPE, $PAYLOAD).build()
    message: Use RawEventBuilder instead of manual struct creation

  # Rule 3: Convert simple for loops to bulk operations
  - id: manual-event-loop
    language: rust
    pattern: |
      for $I in 0..$COUNT {
        let $EVENT = $$$;
        $INSERT
      }
    fix: |
      common::generators::test_events($COUNT)
        .into_iter()
        .map(|event| common::insert_test_event(&pool, &event))
        .collect::<FuturesUnordered<_>>()
        .try_collect::<Vec<_>>()
        .await?;
    message: Use bulk event generators instead of manual loops

  # Rule 4: Convert sleep patterns
  - id: manual-sleep
    language: rust
    pattern: tokio::time::sleep(Duration::from_millis($MS)).await
    fix: common::timing_optimization::adaptive_delay(timing::DelayPurpose::Generic).await
    message: Use adaptive delays instead of fixed sleeps

  # Rule 5: Convert test database cleanup
  - id: manual-cleanup
    language: rust
    pattern: |
      sqlx::query("DELETE FROM $TABLE")
        .execute(&$POOL)
        .await?;
    fix: |
      common::cleanup::truncate_all_tables(&$POOL).await?;
    message: Use common cleanup utilities

  # Rule 6: Convert manual event insertion
  - id: manual-insert
    language: rust
    pattern: |
      sqlx::query!(
        r#"INSERT INTO raw.events $$$"#,
        $$$
      ).execute(&$POOL).await?;
    fix: |
      common::insert_test_event(&$POOL, &event).await?;
    message: Use common event insertion helper

  # Rule 7: Convert event count verification
  - id: manual-count-check
    language: rust
    pattern: |
      let $COUNT = sqlx::query!("SELECT COUNT(*) $$$")
        .fetch_one(&$POOL)
        .await?;
      assert_eq!($COUNT.$FIELD, $EXPECTED);
    fix: |
      let count = common::get_event_count(&$POOL).await?;
      assert_eq!(count, $EXPECTED);
    message: Use common count verification helper

  # Rule 8: Convert worker test setup
  - id: manual-worker-setup
    language: rust
    pattern: |
      for $I in 0..$COUNT {
        sqlx::query!(
          r#"INSERT INTO sinex_schemas.work_queue $$$"#,
          $$$
        ).execute(&$POOL).await?;
      }
    fix: |
      common::worker_test_utils::setup_test_worker(&$POOL, "test_worker", $COUNT).await?;
    message: Use worker test utilities

  # Rule 9: Convert validation assertions
  - id: manual-validation
    language: rust
    pattern: |
      let $VALIDATOR = EventValidator::new();
      let $RESULT = $VALIDATOR.validate(&$EVENT);
      assert!($RESULT.is_ok());
    fix: |
      common::validation_test_utils::assert_valid_event(&$EVENT);
    message: Use validation test utilities

  # Rule 10: Convert parameterizable test patterns
  - id: repeated-test-pattern
    language: rust
    pattern: |
      #[tokio::test]
      async fn $TEST1() -> Result<()> {
        let $EVENT1 = $$$;
        $BODY1
      }
      
      #[tokio::test]
      async fn $TEST2() -> Result<()> {
        let $EVENT2 = $$$;
        $BODY2
      }
    fix: |
      #[tokio::test]
      async fn test_parameterized() -> Result<()> {
        let test_cases = vec![
          ("case1", $EVENT1),
          ("case2", $EVENT2),
        ];
        
        common::parameterized::run_test_cases(test_cases, |name, event| async move {
          // Common test body
        }).await
      }
    message: Use parameterized testing for similar test cases

# Composite rules for larger refactorings
composite_rules:
  # Convert entire test file structure
  - id: modernize-test-file
    description: Apply all modernization rules to a test file
    rules:
      - manual-db-setup
      - manual-raw-event
      - manual-event-loop
      - manual-sleep
      - manual-cleanup
      - manual-insert
      - manual-count-check
      - manual-worker-setup
      - manual-validation

  # Convert to scenario builders
  - id: use-scenario-builders
    description: Convert manual test orchestration to scenario builders
    pattern: |
      let pool = $POOL_SETUP;
      $EVENT_CREATION
      $EVENT_INSERTION
      $VERIFICATION
    fix: |
      let pool = common::create_test_db_pool().await?;
      
      EventScenarioBuilder::new()
        .with_events($EVENTS)
        .with_validation($VALIDATION)
        .execute(&pool)
        .await?;

# Validation rules to ensure conversions maintain correctness
validation:
  - id: ensure-error-handling
    description: Ensure ? operator is used for error propagation
    pattern: .await.unwrap()
    severity: error
    message: Use .await? instead of .await.unwrap() in tests

  - id: ensure-test-coverage
    description: Ensure CoverageTracker is used in converted tests
    pattern: |
      #[test]
      $FUNC
    require: CoverageTracker::record
    message: Add coverage tracking to converted tests