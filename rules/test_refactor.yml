# rules/test_refactor_v2.yml
# Orchestrated by migrate_and_refactor_v2.py

# ==============================================================================
# PASS 1: CORE MIGRATION
# ==============================================================================
- id: migrate-test-attribute
  language: rust
  rule: { pattern: '#[tokio::test]', inside: { kind: function_item } }
  fix: '#[sinex_test]'
- id: migrate-function-signature
  language: rust
  rule:
    kind: function_item
    has: { field: attribute, pattern: '#[sinex_test]' }
    has: { field: parameters, pattern: '()' }
    pattern: $VIS async fn $NAME() $RETURN_AND_BODY
  fix: |
    $VIS async fn $NAME(ctx: TestContext) -> Result<(), Box<dyn std::error::Error>> $RETURN_AND_BODY
- id: add-prelude-import
  language: rust
  rule:
    kind: source_file
    has: { pattern: '#[sinex_test]' }
    not: { has: { pattern: 'use crate::common::prelude::*;' } }
  fix: |
    use crate::common::prelude::*;

    $$$
- id: migrate-pool-initialization
  language: rust
  rule:
    kind: let_declaration
    inside: { kind: function_item, has: { pattern: '#[sinex_test]' } }
    any:
      - pattern: 'let $POOL = get_shared_test_pool().await?;'
      - pattern: 'let $POOL = create_test_db_pool().await?;'
      - pattern: 'let $POOL = TestPool::new().await?;'
      - pattern: 'let $POOL = TestPool::with_strategy($$$).await?;'
  fix: 'let $POOL = ctx.pool();'

---
# ==============================================================================
# PASS 2: QUALITY & PERFORMANCE FIXES
# ==============================================================================
- id: replace-unwrap-with-expect
  language: rust
  rule:
    pattern: $VAR.unwrap()
    not: { inside: { kind: macro_invocation, has: { pattern: 'assert' } } }
  transform:
    EXPECT_MSG: { replace: { source: $VAR, replace: '.*', by: 'Expected `$VAR` to be Some or Ok' } }
  fix: '$VAR.expect("$EXPECT_MSG")'

- id: add-assert-eq-message
  language: rust
  rule:
    pattern: assert_eq!($A, $B)
  fix: 'assert_eq!($A, $B, "Assertion failed: `left == right`\n  left: `{:?}`,\n right: `{:?}`", $A, $B)'

- id: replace-sleep-with-wait-helper
  language: rust
  rule:
    pattern: 'tokio::time::sleep(Duration::from_secs($S)).await;'
    inside: { kind: function_item, has: { pattern: '#[sinex_test]' } }
  fix: 'ctx.wait_for_processing().await?;'

- id: replace-println-with-tracing
  language: rust
  rule:
    pattern: println!($$$ARGS);
    inside: { kind: function_item, has: { pattern: '#[sinex_test]' } }
  fix: 'tracing::info!($$$ARGS);'

---
# ==============================================================================
# PASS 3: FINAL CLEANUP & REFINEMENT
# ==============================================================================
- id: cleanup-redundant-pool-variable
  language: rust
  rule:
    kind: block_expression
    inside: { kind: function_item, has: { pattern: '#[sinex_test](ctx: TestContext)' } }
    has: { pattern: 'let pool = ctx.pool();' }
  transform:
    CLEANED_BODY:
      rewrite:
        source: $$$
        rewriters:
          - id: delete-let-pool
            rule: { pattern: 'let pool = ctx.pool();' }
            fix: ''
          - id: replace-pool-usage
            rule: { kind: identifier, pattern: pool }
            fix: 'ctx.pool()'
  fix: '$CLEANED_BODY'

- id: add-ok-return
  language: rust
  rule:
    kind: block_expression
    inside:
      kind: function_item
      has: { pattern: '#[sinex_test]' }
    regex: '(?s)\{.*\S.*\s*\}'
    pattern: '{ $$$STMTS }'
    not:
      has:
        any:
          - pattern: '$TAIL;'
            constraints: { TAIL: { regex: '\?$' } }
          - pattern: $TAIL
            constraints:
              TAIL: { any: [{ regex: '^(Ok|Err)\(.*\)$' }, { regex: '^return ' }] }
  fix: '{ $$$STMTS; Ok(()) }'

---
# ==============================================================================
# PASS 4: STRATEGIC IMPROVEMENTS (New!)
# ==============================================================================
- id: tag-slow-tests
  language: rust
  rule:
    kind: function_item
    has: { pattern: '#[sinex_test]' }
    # Heuristics for slow tests: long sleeps or large loops
    has:
      any:
        - pattern: 'tokio::time::sleep(Duration::from_secs($S))'
          constraints: { S: { regex: '^[2-9]|[1-9][0-9]+' } } # sleep >= 2s
        - pattern: 'for $_ in 0..1000' # loops with >1000 iterations
    # Add an ignore attribute to flag for performance review
  fix: |
    #[ignore = "slow test: auto-tagged for performance review"]
    $$$

- id: add-doc-stub-for-adversarial
  language: rust
  rule:
    kind: function_item
    inside: { file_path: { regex: 'adversarial' } }
    not: { has: { pattern: '#[doc' } } # Does not already have a doc comment
  fix: |
    /// TODO: Document the attack vector and expected outcome for this test.
    /// Scenario:
    /// Expected Behavior:
    $$$
