# Pre-commit configuration for Sinex abstraction enforcement
# Install with: pre-commit install

repos:
  # Rust formatting
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Cargo Format
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false

  # Sinex abstraction checks
  - repo: local
    hooks:
      - id: check-abstractions
        name: Check Sinex Abstractions
        entry: ./scripts/check-abstractions.sh
        language: script
        types: [rust]
        pass_filenames: false
        
      - id: ast-grep-abstractions
        name: AST-based Abstraction Checks
        entry: ./scripts/lint-abstractions.sh check
        language: script
        types: [rust]
        pass_filenames: false

  # Clippy with custom config
  - repo: local
    hooks:
      - id: cargo-clippy
        name: Cargo Clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

  # Check for TODO/FIXME without issue numbers
  - repo: local
    hooks:
      - id: todo-check
        name: Check TODOs have issue numbers
        entry: sh -c 'grep -n "TODO\|FIXME" --include="*.rs" -r crate/ | grep -v "#[0-9]\+" && exit 1 || exit 0'
        language: system
        pass_filenames: false

  # Verify test abstractions are used
  - repo: local
    hooks:
      - id: test-abstractions
        name: Verify Test Abstractions
        entry: sh -c 'rg "sqlx::query!" test/ && echo "Found raw SQL in tests!" && exit 1 || exit 0'
        language: system
        types: [rust]
        files: ^test/

  # Update abstraction metrics
  - repo: local
    hooks:
      - id: update-metrics
        name: Update Abstraction Metrics
        entry: python3 scripts/abstraction-dashboard.py collect
        language: system
        pass_filenames: false
        stages: [post-commit]
        always_run: true

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml

  # Security checks
  - repo: local
    hooks:
      - id: no-hardcoded-secrets
        name: Check for hardcoded secrets
        entry: sh -c 'rg "(password|secret|key|token)\s*=\s*\"[^\"]+\"" --type rust && echo "Found potential hardcoded secrets!" && exit 1 || exit 0'
        language: system
        types: [rust]

# Configuration
default_stages: [commit]
fail_fast: false
minimum_pre_commit_version: '3.0.0'