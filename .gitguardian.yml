version: 2

secret:
  ignored_matches:
    - name: nixos admin token examples
      match: "admin:admin"
      paths:
        - nixos/README.md
        - nixos/examples/coordination.nix
        - nixos/examples/dev-sandbox.nix
        - nixos/examples/headless.nix
        - nixos/examples/monitoring.nix
        - nixos/examples/workstation.nix
    - name: privacy engine jwt fixture
      match: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
      paths:
        - crate/lib/sinex-primitives/src/privacy/engine.rs
