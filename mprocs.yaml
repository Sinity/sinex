# mprocs configuration
# Press 'q' to detach from tmux (keeps running), Ctrl+q to quit mprocs

# Keymap for process list view
keymap_procs:
  <q>: null  # Disable 'q' key in mprocs (tmux will handle it for detaching)
  <C-q>: { c: quit }  # Ctrl+q to quit mprocs
  
  # Navigation (vim-style)
  <j>: { c: next-proc }
  <k>: { c: prev-proc }
  <i>: { c: focus-term }  # Enter terminal
  <Esc>: { c: focus-procs }
  <Tab>: { c: toggle-focus }
  <r>: { c: restart-proc }
  <s>: { c: term-proc }
  <z>: { c: zoom }

# Keymap for terminal view  
keymap_term:
  <q>: null  # Disable 'q' in terminal view too
  <C-q>: { c: quit }
  <Esc>: { c: focus-procs }
  <Tab>: { c: toggle-focus }

procs:
  # Main development - bacon handles check, test, clippy
  bacon:
    cmd:
      [
        "zsh",
        "-c",
        "mkdir -p .claude-outputs && bacon 2>&1 | tee >(while IFS= read -r line; do echo \"[$(date '+%H:%M:%S')] $line\" | sed 's/\\x1b\\[[0-9;]*m//g'; done > .claude-outputs/bacon.log)",
      ]

  # Claude's activity log - formatted and colored  
  claude-activity:
    cmd:
      [
        "zsh",
        "-c",
        "cd /realm/project/sinex && LATEST=$(ls -t ~/.claude/projects/-realm-project-sinex/*.jsonl | head -1) && echo \"Watching: $LATEST\" && tail -F \"$LATEST\" 2>/dev/null | jq -r '.message.content[0].text // empty' | head -c 200",
      ]

  # Claude Code Monitor - real-time metrics
  ccm:
    cmd: ["zsh", "-c", "ccmonitor --refresh-rate 1 --refresh-per-second 20"]

  # Claude Code usage stats - updates every 15 minutes
  cc-usage:
    cmd:
      [
        "zsh",
        "-c",
        "while true; do clear; echo '=== Claude Code Usage ==='; npx --yes ccusage@latest; echo -e '\\n=== Active Blocks ==='; npx --yes ccusage@latest blocks --include-active; sleep 900; done",
      ]

  # Database activity
  db:
    cmd:
      [
        "zsh",
        "-c",
        'exec watch -n 5 ''psql -h /run/postgresql -d sinex_dev -c "SELECT pid, usename, state, substring(query,1,60) as query FROM pg_stat_activity WHERE datname = ''''sinex_dev'''' AND state != ''''idle'''';" 2>/dev/null || echo ''''DB idle''''''',
      ]

  # Git status
  git:
    cmd:
      [
        "zsh",
        "-c",
        "exec watch -n 2 'git status -sb && echo -e \"\\n--- Recent commits ---\" && git log --oneline -5'",
      ]

  # System resources
  btop:
    cmd: ["btop"]