# Sinex Development Configuration
# Everything in one place, with sensible defaults

[dev]
# What happens when you run 'sx dev'
format = true
build = true
test = "fast"  # fast, unit, all
auto_fix = true

[test]
# Smart test defaults
fast = "test(unit::) or test(property::)"
default = "fast"
parallel = true
timeout_minutes = 2

[build]
# Build configuration
use_sccache = true
use_mold = true
parallel = true
auto_precompile = true

[environment]
# Auto-managed services
auto_start_bacon = true
auto_start_postgres = true
auto_fix_issues = true
quiet_mode = false

[notifications]
# Smart notifications
on_error = true
on_success = false
on_long_running = true  # > 30s