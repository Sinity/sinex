# Cloud-agent sidecar stack.
#
# Brings up Postgres 18 (with timescaledb + pgvector + pg_jsonschema) and
# NATS 2 (with JetStream) inside a cloud sandbox so focused DB/NATS tests
# can run against ephemeral infrastructure.
#
# Usage from a cloud-agent sandbox:
#   docker compose -f xtask/cloud/docker-compose.yml up -d
#   DATABASE_URL="postgres://sinex:dev@localhost:5432/sinex_dev" \
#     NATS_URL="nats://localhost:4222" \
#     xtask test -p <crate>
#   docker compose -f xtask/cloud/docker-compose.yml down
#
# Image resolution: the ghcr.io/sinity/* tags are NOT published (verified
# 2026-07-10: anonymous pull returns 403/404). Each service therefore carries
# a `build:` context pointing at the in-repo Dockerfile; `docker compose up
# --build` builds them locally during the sandbox's internet-enabled setup
# phase, and the 12h/7d container caches make later sessions cheap. If the
# images are ever published publicly, the tags below become a pull fast-path.
# See xtask/cloud/docker/README.md for the build/push workflow.

services:
  postgres:
    image: ghcr.io/sinity/sinex-pg18:latest
    build: docker/pg18-sinex
    environment:
      POSTGRES_USER: sinex
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: sinex_dev
    ports:
      - "5432:5432"
    # Ephemeral data — each sandbox boot is a clean DB.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinex -d sinex_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: ghcr.io/sinity/sinex-nats:latest
    build: docker/nats-sinex
    ports:
      - "4222:4222"
      - "8222:8222"
    tmpfs:
      - /data/jetstream
