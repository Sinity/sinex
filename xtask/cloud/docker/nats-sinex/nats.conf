# Sinex cloud-sidecar NATS config.
# Single-node, ephemeral, listens on all interfaces inside the container
# (the compose file maps 4222 to the host).

server_name: sinex-cloud-nats
listen: 0.0.0.0:4222

# JetStream storage. The compose file mounts a tmpfs over this path so
# state vanishes between sandbox boots.
jetstream {
  store_dir: /data/jetstream
  max_memory_store: 256MB
  max_file_store: 4GB
}

# No auth — cloud sidecar is reachable only from within the sandbox.
# Do NOT publish this image to a host that exposes 4222 externally.

http_port: 8222
