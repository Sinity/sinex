[package]
name    = "xtask"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "xtask"
path = "src/main.rs"

[lib]
name = "xtask"
path = "src/lib.rs"

[dependencies]
clap = { workspace = true, features = [
    "derive",
] }
anyhow = { workspace = true }
once_cell = { workspace = true }
walkdir = "2.5"
which = "6.0"
sha2 = "0.10"

clap_complete = "4.5"
tempfile = "3.14"
serde = { workspace = true, features = [
    "derive",
] }
serde_json = { workspace = true }

rusqlite = { workspace = true }
console = "0.15"
quick-xml = "0.38"
indicatif = "0.17"
num_cpus = "1.16"
atty = "0.2"

dirs = "5.0"
toml = { workspace = true }
gethostname = { workspace = true }
guppy = "0.17"
libc = "0.2"


# TLS certificate generation
rcgen       = { workspace = true }
x509-parser = "0.16"
time        = { workspace = true }

# Hot reload and orchestration
notify = "6"
notify-debouncer-mini = "0.4"
nix = { version = "0.27", features = [
    "fs",
    "signal",
    "process",
] }
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "rustls-tls",
] }
camino = "1"
tokio = { workspace = true, features = [
    "full",
    "signal",
    "process",
] }
async-trait = { workspace = true }

# Sandbox infrastructure
async-nats = { workspace = true, optional = true }
proptest = { workspace = true, optional = true }

# Core types (Timestamp, etc.) - always available
sinex-primitives = { path = "../crate/lib/sinex-primitives", default-features = false, features = ["testing"] }
sinex-schema = { path = "../crate/lib/sinex-schema" }

# Sandbox-only heavy deps
sinex-db = { path = "../crate/lib/sinex-db", optional = true }
sinex-node-sdk = { path = "../crate/lib/sinex-node-sdk", optional = true }
url = { workspace = true, optional = true }
rand = "0.8"
tokio-stream = "0.1"
color-eyre = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }
bon = { workspace = true, optional = true }
sqlx = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }
futures = { version = "0.3", optional = true }
parking_lot = { version = "0.12", optional = true }
insta = { workspace = true, optional = true }
blake3 = { workspace = true, optional = true }

# Macros
xtask-macros = { path = "./macros" }

assert_cmd = "2.0"
predicates = "3.0"
sysinfo = "0.38.0"


# Shell scripting (replaces ProcessBuilder)
xshell = "0.2"

# Interactive prompts


# Pretty table output
tabled = "0.17"

# Better panic messages for users
human-panic = "2.0"

# Build-time metadata (git hash, build time)

shadow-rs = "0.35"

[build-dependencies]
shadow-rs = "0.35"

[features]
# NOTE: No default features. The xtask binary doesn't need sandbox.
# Sandbox is only needed when xtask is used as a library for tests.
# Test code should depend on xtask with: features = ["sandbox"]
default = []

sandbox = [
    "async-nats",
    "proptest",
    "sinex-db",
    "sinex-node-sdk",
    "color-eyre",
    "uuid",
    "bon",
    "sqlx",
    "tracing",
    "tracing-subscriber",
    "futures",
    "parking_lot",
    "insta",
    "blake3",
    "url",
]

[lints]
workspace = true
