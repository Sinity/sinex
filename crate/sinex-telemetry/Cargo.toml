[package]
name = "sinex-telemetry"
version.workspace = true
edition.workspace = true
authors.workspace = true


[dependencies]
# Core async and concurrency
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
futures = { workspace = true }

# Metrics collection
prometheus = { version = "0.13" }
once_cell = { workspace = true }
parking_lot = "0.12"

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Database
sqlx = { workspace = true }

# Time handling
chrono = { workspace = true }

# Proc macros
proc-macro2 = "1.0"
quote = "1.0"
syn = { version = "2.0", features = ["full", "extra-traits", "visit-mut"] }

# System metrics
sysinfo = "0.30"
procfs = "0.16"

# Tracing
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Additional dependencies
uuid = { workspace = true }
thiserror = { workspace = true }
clap = { workspace = true }

# Local dependencies
sinex-core-types = { path = "../sinex-core-types" }
sinex-core-utils = { path = "../sinex-core-utils" }
sinex-ulid = { path = "../sinex-ulid" }
sinex-error = { path = "../sinex-error" }
sinex-macros = { path = "../sinex-macros" }
sinex-db = { path = "../sinex-db" }
sinex-events = { path = "../sinex-events" }

[dev-dependencies]
tokio-test = "0.4"
tempfile = { workspace = true }
rand = "0.8"
sinex-test-utils = { path = "../sinex-test-utils", features = ["bench"] }
anyhow = { workspace = true }

