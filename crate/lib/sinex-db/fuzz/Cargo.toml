[package]
name = "sinex-db-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
sinex-db = { path = ".." }
arbitrary = { version = "1", features = ["derive"] }

[[bin]]
name = "fuzz_copy_escape"
path = "fuzz_targets/fuzz_copy_escape.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
