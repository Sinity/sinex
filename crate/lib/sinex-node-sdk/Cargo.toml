[package]
name = "sinex-node-sdk"
version = "0.4.2"
edition = "2024"

[dependencies]
futures = { workspace = true }
sd-notify = { workspace = true }
parking_lot = { workspace = true }
blake3 = { workspace = true }
sysinfo = { workspace = true }
url = "2.5"
which = { workspace = true }
urlencoding = "2.1"
libc = { workspace = true }
semver = { workspace = true }
shadow-rs = { workspace = true }

# Sinex crates
sinex-primitives = { path = "../sinex-primitives", features = ["sqlx", "nats"] }

sinex-db = { path = "../sinex-db", optional = true }

[features]
default = ["db", "messaging", "preflight"]
db = ["dep:sinex-db", "dep:sqlx"]
messaging = ["async-nats"]
preflight = []

[dependencies.camino]
workspace = true
[dependencies.thiserror]
workspace = true
[dependencies.bon]
workspace = true
[dependencies.async-trait]
workspace = true
[dependencies.tokio]
workspace = true
features = ["full"]
[dependencies.tokio-stream]
workspace = true
[dependencies.tracing]
workspace = true
[dependencies.tracing-subscriber]
workspace = true
[dependencies.tempfile]
workspace = true
[dependencies.serde]
workspace = true
[dependencies.serde_json]
workspace = true
[dependencies.schemars]
workspace = true
[dependencies.base64]
workspace = true
[dependencies.jsonschema]
workspace = true
[dependencies.sqlx]
workspace = true
optional = true
[dependencies.async-nats]
workspace = true
optional = true
[dependencies.time]
workspace = true
[dependencies.uuid]
workspace = true
[dependencies.clap]
workspace = true
features = ["derive"]
[dependencies.csv]
workspace = true
[dependencies.dirs]
workspace = true
[dependencies.rusqlite]
workspace = true
[dependencies.validator]
workspace = true
[dependencies.gethostname]
workspace = true
[dependencies.ahash]
workspace = true
[dependencies.sha2]
version = "0.10"
default-features = false
features = ["std"]
[dependencies.nix]
workspace = true
[dependencies.globset]
workspace = true
[dependencies.notify]
workspace = true
[dependencies.zbus]
workspace = true
[dependencies.zvariant]
workspace = true
[dependencies.arboard]
version = "3.4"
[dependencies.async-stream]
version = "0.3"
[dependencies.human-panic]
workspace = true
[build-dependencies]
shadow-rs = { workspace = true }

[build-dependencies.time]
workspace = true

[dev-dependencies]
tempfile = { workspace = true }
proptest = { workspace = true }
xtask = { path = "../../../xtask" }
sinex-primitives = { path = "../sinex-primitives", features = ["testing"] }
sinex-macros = { path = "../sinex-macros" }
[dev-dependencies.color-eyre]
workspace = true

[lints]
workspace = true
