[package]
name = "sinex-node-sdk"
version = "0.4.2"
edition = "2024"

[dependencies]
futures = "0.3"
toml = "0.8"
sd-notify = "0.4"
parking_lot = "0.12"
blake3 = "1.5"
sysinfo = "0.31"
url = "2.5"
which = "6.0"
urlencoding = "2.1"
libc = "0.2"
semver = { version = "1.0", features = ["serde"] }
shadow-rs = "0.35"

# Sinex crates
sinex-primitives = { path = "../sinex-primitives", features = ["sqlx", "nats"] }

sinex-db = { path = "../sinex-db", optional = true }

[features]
default = ["db", "messaging", "preflight"]
db = ["dep:sinex-db", "sinex-db/sqlx", "dep:sqlx"]
messaging = ["async-nats"]
event-source = []
automaton = []
macros = ["dep:sinex-macros"]
preflight = []
external-tests = []

[dependencies.camino]
workspace = true
[dependencies.thiserror]
workspace = true
[dependencies.color-eyre]
workspace = true
[dependencies.bon]
workspace = true
[dependencies.async-trait]
workspace = true
[dependencies.tokio]
workspace = true
features = ["full"]
[dependencies.tokio-stream]
workspace = true
[dependencies.tracing]
workspace = true
[dependencies.tracing-subscriber]
workspace = true
[dependencies.tempfile]
workspace = true
[dependencies.serde]
workspace = true
[dependencies.serde_json]
workspace = true
[dependencies.jsonschema]
workspace = true
[dependencies.sqlx]
workspace = true
optional = true
[dependencies.async-nats]
workspace = true
optional = true
[dependencies.time]
workspace = true
[dependencies.uuid]
workspace = true
[dependencies.clap]
workspace = true
features = ["derive"]
[dependencies.dirs]
workspace = true
[dependencies.validator]
workspace = true
[dependencies.figment]
workspace = true
[dependencies.uncased]
workspace = true
[dependencies.gethostname]
workspace = true
[dependencies.ahash]
workspace = true
[dependencies.sha2]
version = "0.10"
default-features = false
features = ["std"]
[dependencies.nix]
version = "0.28"
features = ["fs", "resource"]
[dependencies.notify]
workspace = true
[dependencies.sinex-macros]
path = "../sinex-macros"
optional = true

[build-dependencies]
shadow-rs = "0.35"

[build-dependencies.time]
workspace = true

[dev-dependencies]
tempfile = "3.13"
proptest = "1"
xtask = { path = "../../../xtask" }
sinex-primitives = { path = "../sinex-primitives", features = ["testing"] }

[lints]
workspace = true
