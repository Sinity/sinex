[package]
name = "sinex-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
description = "Core types and database layer for Sinex - unified from sinex-core and sinex-core"

[lib]
doctest = false

[dependencies]
# Core dependencies merged from both crates
sinex-macros = { path = "../sinex-macros", optional = true }
sinex-schema = { path = "../sinex-schema" }

# Always required - types, validation, error handling
camino = { workspace = true }
tokio = { workspace = true }
anyhow = { workspace = true }
color-eyre = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
once_cell = { workspace = true }
gethostname = { workspace = true }
urlencoding = "2.1"
percent-encoding = "2.3"
blake3 = "1.5"
validator = { workspace = true }
bon = { workspace = true }
async-trait = "0.1"
futures = "0.3"
num-traits = "0.2"
ahash = { workspace = true }

# Database (optional - for db module)
sqlx = { workspace = true, optional = true }
jsonschema = { version = "0.17", optional = true }

# NATS (optional - for nats module)
async-nats = { workspace = true, optional = true }

# Migration system (optional)
sea-orm-migration = { version = "1.0.0", features = ["sqlx-postgres", "runtime-tokio-rustls"], optional = true }

# Type dependencies (from sinex-core)
ulid = { workspace = true }
rand = { workspace = true }
proptest = { workspace = true, optional = true }
schemars = { workspace = true }
regex = { workspace = true }
url = { workspace = true }
lazy_static = "1.5"
displaydoc = "0.2"
indexmap = { version = "2.0", features = ["serde"] }
serde_path_to_error = { workspace = true }
inventory = { workspace = true }
rusqlite = { workspace = true }
tokio-retry = { workspace = true }
notify = { workspace = true }

# Schema manager binary support
clap = { workspace = true, features = ["derive", "env"], optional = true }
tracing-subscriber = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }

parking_lot = "0.12"

[features]
default = ["full"]
# Full feature set - includes all optional dependencies
full = ["macros", "sqlx", "nats", "migrations"]
# Just types, domain types, validation, error handling - no DB, no NATS
# Includes macros because EventPayload derive is needed by all payloads
types-only = ["macros"]
# Individual features
macros = ["dep:sinex-macros"]
sqlx = ["dep:sqlx", "dep:jsonschema"]
nats = ["dep:async-nats"]
migrations = ["dep:sea-orm-migration", "sqlx"]
arbitrary = ["dep:proptest"]
schema-manager = ["dep:clap", "dep:tracing-subscriber", "dep:sha2"]
json-schema = []
testing = []  # Enable test-only methods
state-tests = []
slow-tests = []

[[bin]]
name = "sinex-schema"
path = "src/types/bin/sinex-schema.rs"
required-features = ["schema-manager"]

[dev-dependencies]
tokio-test = "0.4"
rstest = { workspace = true }
tempfile = { workspace = true }
sinex-node-sdk = { path = "../../lib/sinex-node-sdk", features = ["preflight"] }
proptest = { workspace = true }
nkeys = "0.3"
