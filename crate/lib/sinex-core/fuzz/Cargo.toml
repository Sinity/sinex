[package]
name = "sinex-core-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"

[dependencies.sinex-core]
path = ".."

# Path sanitization fuzzing
[[bin]]
name = "fuzz_path_sanitization"
path = "fuzz_targets/fuzz_path_sanitization.rs"
test = false
doc = false
bench = false

# JSON payload parsing fuzzing
[[bin]]
name = "fuzz_json_payload"
path = "fuzz_targets/fuzz_json_payload.rs"
test = false
doc = false
bench = false

# Event validation fuzzing
[[bin]]
name = "fuzz_event_validation"
path = "fuzz_targets/fuzz_event_validation.rs"
test = false
doc = false
bench = false

# SQL identifier escaping fuzzing
[[bin]]
name = "fuzz_sql_escaping"
path = "fuzz_targets/fuzz_sql_escaping.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
