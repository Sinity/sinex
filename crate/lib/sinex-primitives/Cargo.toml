[package]
name = "sinex-primitives"
version = "0.1.0"
edition = "2024"
description = "Core domain primitives for Sinex (Events, IDs, Provenance, Environment)"

[features]
default = []
testing = []
proptest = ["dep:proptest"]
sqlx = ["dep:sqlx"]
nats = ["dep:async-nats", "dep:nkeys", "dep:futures", "dep:rustls"]

[dependencies]
# Core dependencies
async-nats = { workspace = true, optional = true }
nkeys = { version = "0.3", optional = true }
rustls = { version = "0.23", default-features = false, features = ["aws_lc_rs"], optional = true }
urlencoding = "2.1"
percent-encoding = "2.3"
bytes = "1.5"
futures = { workspace = true, optional = true }
time = { workspace = true }

serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
gethostname = { workspace = true }
schemars = { workspace = true }
thiserror = { workspace = true }
camino = { workspace = true, features = ["serde1"] }
url = { workspace = true, features = ["serde"] }
tokio = { workspace = true, features = ["sync", "time"] }
indexmap = { version = "2.1", features = ["serde"] }
displaydoc = "0.2"
serde_path_to_error = "0.1"
color-eyre = { workspace = true }
tracing = { workspace = true }
regex = { workspace = true }

# Privacy engine
chacha20poly1305 = "0.10"
base64 = { workspace = true }
blake3 = { workspace = true }
toml = { workspace = true }
validator = { workspace = true, features = ["derive"] }
unicode-normalization = "0.1"
inventory = { workspace = true }

# Macros
sinex-macros = { path = "../sinex-macros" }

# Domain dependencies
uuid = { workspace = true, features = ["serde", "v4", "v7"] }
rand = { workspace = true }
bon = { workspace = true }
notify = { workspace = true }
tokio-retry = { workspace = true }

# Optional DB support
sqlx = { workspace = true, optional = true }

[dependencies.proptest]
workspace = true
optional = true

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
sinex-primitives = { path = ".", features = ["testing", "sqlx"] }
proptest = { workspace = true }
sinex-db = { path = "../sinex-db" }
tempfile = { workspace = true }
xtask = { path = "../../../xtask" }
trybuild = { workspace = true }

[lints]
workspace = true
