[package]
name = "sinex-primitives-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
sinex-primitives = { path = ".." }
serde_json = "1"
arbitrary = { version = "1", features = ["derive"] }

[[bin]]
name = "fuzz_event_roundtrip"
path = "fuzz_targets/fuzz_event_roundtrip.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_privacy_engine"
path = "fuzz_targets/fuzz_privacy_engine.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_validation"
path = "fuzz_targets/fuzz_validation.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
