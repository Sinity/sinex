[package]
name        = "sinex-schema"
publish     = false
description = "Schema definitions and database migrations for Sinex"

[lib]
name = "sinex_schema"
path = "src/lib.rs"

[dependencies]
serde            = { workspace = true, features = ["derive"] }
sinex-primitives = { path = "../sinex-primitives" }
time             = { workspace = true }
tracing          = { workspace = true }

[features]
default = [
]

[dev-dependencies]
tokio-test        = "0.4"
pretty_assertions = "1.4"
tempfile          = "3.0"
tokio             = { workspace = true }
color-eyre        = { workspace = true }

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[package.repository]
workspace = true

[package.license]
workspace = true

[dependencies.sea-query]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.tokio]
workspace = true

[dev-dependencies.rstest]
workspace = true

[dev-dependencies.proptest]
workspace = true

[dev-dependencies.xtask]
path = "../../../xtask"

[dev-dependencies.sinex-primitives]
path = "../sinex-primitives"
features = [
    "testing",
]

[lints]
workspace = true
