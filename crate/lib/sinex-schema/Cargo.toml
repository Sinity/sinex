[package]
name = "sinex-schema"
publish = false
description = "Schema definitions and database migrations for Sinex"

[lib]
name = "sinex_schema"
path = "src/lib.rs"

[[bin]]
name = "sinex-schema"
path = "src/main.rs"

[dependencies]
blake3 = { workspace = true }

[features]
default = [ "sqlx", "json-schema", "serde",]
sqlx = []
arbitrary = [ "dep:proptest",]
json-schema = [ "dep:schemars",]
serde = [ "dep:serde",]

[dev-dependencies]
tokio-test = "0.4"
pretty_assertions = "1.4"
tempfile = "3.0"

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[package.repository]
workspace = true

[package.license]
workspace = true

[dependencies.async-trait]
version = "0.1"

[dependencies.sea-orm-migration]
workspace = true

[dependencies.tokio]
version = "1"
features = [ "macros", "rt-multi-thread",]

[dependencies.color-eyre]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.time]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.ulid]
workspace = true

[dependencies.serde]
workspace = true
optional = true

[dependencies.thiserror]
workspace = true

[dependencies.rand]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.schemars]
workspace = true
optional = true

[dependencies.proptest]
workspace = true
optional = true


[dev-dependencies.rstest]
workspace = true

[dev-dependencies.proptest]
workspace = true

[dev-dependencies.xtask]
path = "../../../xtask"

[dev-dependencies.sinex-primitives]
path = "../sinex-primitives"
features = [ "testing",]

[lints]
workspace = true
