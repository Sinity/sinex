[dependencies]
# Core runtime dependencies
sinex-node-sdk = { path = "../../lib/sinex-node-sdk" }
sinex-core = { path = "../sinex-core" }

# CLI & runtime utilities
clap = { workspace = true, features = ["derive"] }
