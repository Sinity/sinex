[package]
name = "sinex-test-utils"
version = "0.1.0"
edition = "2021"

[features]
default = []
bench = ["dep:divan", "dep:hostname", "dep:num_cpus", "dep:sysinfo"]
slow-tests = []
rstest-preview = []
internal-tests = []

[dependencies]
# This crate is now a facade - all functionality moved to xtask and primitives
xtask = { path = "../../../xtask", default-features = false, features = ["sandbox"] }
sinex-primitives = { path = "../sinex-primitives" }
color-eyre = { workspace = true }

# Benchmarking dependencies (optional)
divan = { version = "0.1", optional = true }
hostname = { version = "0.4", optional = true }
num_cpus = { version = "1.16", optional = true }
sysinfo = { version = "0.30", optional = true }

[dev-dependencies]
# For self-testing
tokio-test = "0.4"
async-std = { version = "1", features = ["attributes"] }
tempfile = "3.10"
