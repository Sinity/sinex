[package]
name = "sinex-test-utils"
version = "0.1.0"
edition = "2021"

[features]
default = []
bench = ["dep:divan", "dep:hostname", "dep:num_cpus", "dep:sysinfo"]

[dependencies]
camino = { workspace = true }
# Core dependencies
anyhow = "1.0"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
uuid = { version = "1.0", features = ["v4"] }
async-trait = "0.1"

# Database
sqlx = { workspace = true }

# Async/concurrency
futures = "0.3"
parking_lot = "0.12"
once_cell = "1.19"
lazy_static = "1.4"

# Testing framework
proptest = "1.0"
pretty_assertions = "1.4"
rstest = { workspace = true }
insta = { workspace = true }
tracing-test = { workspace = true }
similar-asserts = { workspace = true }

# Builder pattern
bon = { workspace = true }

# Sinex dependencies
sinex-types = { path = "../sinex-types" }
sinex-db = { path = "../sinex-db" }
sinex-satellite-sdk = { path = "../sinex-satellite-sdk" }
# Internal macro crate (implementation detail)
sinex-test-utils-macros = { path = "macros" }

# System utilities
gethostname = "0.4"
rand = "0.8"
tempfile = "3.0"
redis = "0.24"
tonic = "0.11"
fastrand = "2.0"
jsonschema = "0.17"
tokio-stream = { version = "0.1", features = ["net"] }
sha2 = "0.10"

# Benchmarking dependencies (optional)
divan = { version = "0.1", optional = true }
hostname = { version = "0.4", optional = true }
num_cpus = { version = "1.16", optional = true }
sysinfo = { version = "0.30", optional = true }

[dev-dependencies]
# For self-testing
tokio-test = "0.4"

