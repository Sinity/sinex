[package]
name = "sinex-migrations"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
publish = false
description = "Database migrations for Sinex"

[lib]
name = "sinex_migrations"
path = "src/lib.rs"

[dependencies]
async-trait = { version = "0.1" }
sea-orm-migration = { version = "1.0", features = ["sqlx-postgres", "runtime-tokio-rustls"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
sea-query = { version = "0.30", features = ["with-uuid", "with-chrono", "with-json", "postgres-array"] }
color-eyre = { workspace = true }

[features]
default = []