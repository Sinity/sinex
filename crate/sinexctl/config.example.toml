# Sinexctl User Preferences File
# This file is automatically created in your config directory
# Location: ~/.config/sinexctl/config.toml (Linux/macOS) or %APPDATA%\sinex\sinexctl\config.toml (Windows)

# Runtime connection/auth/TLS settings come from CLI flags or env vars:
#   SINEX_RPC_URL
#   SINEX_RPC_TOKEN
#   SINEX_RPC_TOKEN_FILE
#   SINEX_RPC_CA_CERT
#   SINEX_RPC_CLIENT_CERT
#   SINEX_RPC_CLIENT_KEY
#   SINEX_RPC_INSECURE
#   SINEX_RPC_TIMEOUT_SECS

# Default output format: "table", "json", or "yaml"
default_format = "table"

# Editor for interactive mode (defaults to $EDITOR environment variable or "vim")
editor = "vim"

# Command aliases - shortcuts for common commands
[aliases]
# Example: sinexctl recent -> sinexctl query --since 1h --limit 50
recent = ["query", "--since", "1h", "--limit", "50"]
# Example: sinexctl watch-replay -> sinexctl replay watch --interval 1
watch-replay = ["replay", "watch", "--interval", "1"]

# UI Theme configuration
[theme]
# Table style: "rounded", "ascii", "modern", or "minimal"
table_style = "rounded"

# Colors for terminal output
success_color = "green"
error_color = "red"
warning_color = "yellow"
