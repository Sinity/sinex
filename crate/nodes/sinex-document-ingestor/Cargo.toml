[package]
name = "sinex-document-ingestor"
version = "0.5.0"
edition = "2021"
description = "Direct document ingestor for Sinex satellites"

[dependencies]
mimalloc = { workspace = true }
async-trait = { workspace = true }
color-eyre = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
clap = { workspace = true, features = ["derive"] }

# Sinex dependencies
sinex-node-sdk = { path = "../../lib/sinex-node-sdk" }
sinex-processor-runtime = { path = "../../lib/sinex-processor-runtime" }
sinex-core = { path = "../../lib/sinex-core" }
camino = { workspace = true }

# Document processing
mime_guess = "2.0"

[dev-dependencies]
tempfile = "3.10"
