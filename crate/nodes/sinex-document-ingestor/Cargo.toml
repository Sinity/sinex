[package]
name        = "sinex-document-ingestor"
version     = "0.5.0"
edition     = "2021"
description = "Direct document ingestor for Sinex satellites"

[dependencies]
mime_guess = "2.0"

[dev-dependencies]
tempfile = "3.10"

[dependencies.mimalloc]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.tokio]
workspace = true

[dependencies.time]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.clap]
workspace = true
features = [
    "derive",
]

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"

[dependencies.sinex-processor-runtime]
path = "../../lib/sinex-processor-runtime"

[dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"

[dependencies.camino]
workspace = true

[dev-dependencies.xtask]
path = "../../../xtask"
default-features = false
features = [
    "sandbox",
]

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]
