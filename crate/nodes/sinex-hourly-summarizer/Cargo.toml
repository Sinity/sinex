[[bin]]
name = "sinex-hourly-summarizer"
path = "src/main.rs"

[package]
name = "sinex-hourly-summarizer"

[lib]
doctest = false

[dependencies]
human-panic = "2.0"
tracing = "0.1"

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[package.repository]
workspace = true

[package.license]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"

[dependencies.tokio]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.tracing-subscriber]
version = "0.3"
features = ["env-filter"]

[dependencies.clap]
version = "4.0"
features = ["derive", "env"]

[dev-dependencies.xtask]
path = "../../../xtask"

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = ["testing"]

[lints]
workspace = true
