[package]
name = "sinex-terminal-node"
version.workspace = true
edition.workspace = true
authors.workspace = true

[[bin]]
name = "sinex-terminal-node"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
# Core dependencies
color-eyre = { workspace = true }
thiserror.workspace = true
async-trait.workspace = true
tokio = { workspace = true, features = ["full"] }
futures = "0.3"
tracing.workspace = true
tracing-subscriber.workspace = true

# Configuration
clap = { workspace = true, features = ["derive"] }
serde.workspace = true
serde_json.workspace = true
bon = { workspace = true }

# Filesystem monitoring
notify = "6.1"

# Database (for reading Atuin SQLite)
rusqlite.workspace = true

# Time handling
chrono.workspace = true

# System integration
dirs.workspace = true
once_cell = "1.19"

# Path handling
camino.workspace = true

# File pattern matching
glob = "0.3"

# System dependencies
nix = "0.27"
whoami = "1.4"
libc = "0.2"
which = "5.0"
sysinfo = "0.30"

# Regex for pattern matching
regex = "1.10"
blake3 = { workspace = true }

# Database access for terminal capture
sqlx = { workspace = true, features = ["postgres", "runtime-tokio-rustls", "macros", "uuid", "chrono"] }
async-stream = "0.3"
tokio-stream = { workspace = true, features = ["net"] }

# Validation
validator = { workspace = true, features = ["derive"] }

# ULIDs
ulid = { workspace = true }

# Local dependencies
sinex-node-sdk = { path = "../../lib/sinex-node-sdk", features = ["macros"] }
sinex-processor-runtime = { path = "../../lib/sinex-processor-runtime" }
sinex-core = { path = "../../lib/sinex-core", features = ["macros"] }

[dev-dependencies]
sinex-test-utils = { path = "../../lib/sinex-test-utils" }
gethostname = { workspace = true }
tempfile = "3.13"

[features]
default = []
metrics = []
