[package]
name = "sinex-health-automaton"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[[bin]]
name = "sinex-health-automaton"
path = "src/main.rs"


[dependencies]
mimalloc = { workspace = true }
# Core Sinex dependencies
sinex-core = { path = "../../lib/sinex-core" }
sinex-node-sdk = { path = "../../lib/sinex-node-sdk" }
sinex-processor-runtime = { path = "../../lib/sinex-processor-runtime" }

# CLI parsing
clap = { version = "4.0", features = ["derive", "env"] }

# Async runtime
tokio = { workspace = true }

# Database (for potential direct queries if needed)
sqlx = { workspace = true, features = ["postgres", "runtime-tokio-rustls"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Configuration
figment = { workspace = true }

# Time
chrono = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }
color-eyre = { workspace = true }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# System info
gethostname = "0.4"

# Collections (using std lib)

# Async traits
async-trait = { workspace = true }
camino = { workspace = true }

[dev-dependencies]
sinex-test-utils = { path = "../../lib/sinex-test-utils" }
