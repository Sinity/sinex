[[bin]]
name = "sinex-health-automaton"
path = "src/main.rs"

[package]
name = "sinex-health-automaton"

[dependencies]
tracing     = "0.1"
gethostname = "0.4"
human-panic = "2.0"

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[package.repository]
workspace = true

[package.license]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"

[dependencies.clap]
version = "4.0"
features = [
    "derive",
    "env",
]

[dependencies.tokio]
workspace = true

[dependencies.time]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.tracing-subscriber]
version = "0.3"
features = [
    "env-filter",
]

[dependencies.async-trait]
workspace = true

[dependencies.camino]
workspace = true

[dev-dependencies.xtask]
path = "../../../xtask"

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]

[lints]
workspace = true
