[[bin]]
name = "sinex-desktop-ingestor"
path = "src/main.rs"

[package]
name = "sinex-desktop-ingestor"

[dependencies]
futures     = "0.3"
copypasta   = "0.10"
arboard     = "3.4"
blake3      = "1.5"
urlencoding = "2.1"
gethostname = "0.4"
human-panic = "2.0"

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.tokio]
workspace = true
features = [
    "full",
]

[dependencies.time]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.camino]
workspace = true

[dependencies.clap]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.dirs]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.tokio-retry]
workspace = true

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"
features = [
    "macros",
]

[dependencies.sinex-processor-runtime]
path = "../../lib/sinex-processor-runtime"

features = [
]

[dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"

[dependencies.sinex-db]
path = "../../lib/sinex-db"

[dev-dependencies.xtask]
path = "../../../xtask"
default-features = false
features = [
    "sandbox",
]

[dev-dependencies.xtask-macros]
path = "../../../xtask/macros"

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]

[lints]
workspace = true
