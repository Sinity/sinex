[[bin]]
name = "sinex-desktop-ingestor"
path = "src/main.rs"

[package]
name = "sinex-desktop-ingestor"

[dependencies]
copypasta   = "0.10"
arboard     = "3.4"
blake3      = "1.5"
human-panic = "2.0"

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.tokio]
workspace = true
features = [
    "full",
]

[dependencies.time]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.camino]
workspace = true

[dependencies.clap]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.dirs]
workspace = true

[dependencies.rusqlite]
workspace = true

[dependencies.tokio-retry]
workspace = true

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"

[dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"

[dependencies.sinex-db]
path = "../../lib/sinex-db"

[dev-dependencies.xtask]
path = "../../../xtask"

[dev-dependencies.xtask-macros]
path = "../../../xtask/macros"

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]

[dev-dependencies.tempfile]
workspace = true

[lints]
workspace = true
