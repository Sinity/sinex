[[bin]]
name = "sinex-terminal-ingestor"
path = "src/main.rs"

[package]
name = "sinex-terminal-ingestor"

[dependencies]
futures      = "0.3"
notify       = "6.1"
once_cell    = "1.19"
glob         = "0.3"
nix          = "0.27"
whoami       = "1.4"
libc         = "0.2"
which        = "5.0"
sysinfo      = "0.30"
regex        = "1.10"
async-stream = "0.3"

[dev-dependencies]
tempfile = "3.13"

[features]
default = [
]
metrics = [
]

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.tokio]
workspace = true
features = [
    "full",
]

[dependencies.time]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.clap]
workspace = true
features = [
    "derive",
]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.bon]
workspace = true

[dependencies.rusqlite]
workspace = true

[dependencies.dirs]
workspace = true

[dependencies.camino]
workspace = true

[dependencies.blake3]
workspace = true

[dependencies.sqlx]
workspace = true
features = [
    "postgres",
    "runtime-tokio-rustls",
    "macros",
    "uuid",
    "time",
]

[dependencies.tokio-stream]
workspace = true
features = [
    "net",
]

[dependencies.validator]
workspace = true
features = [
    "derive",
]

[dependencies.ulid]
workspace = true

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"
features = [
    "macros",
]

[dependencies.sinex-processor-runtime]
path = "../../lib/sinex-processor-runtime"

features = [
    "macros",
]

[dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"

[dependencies.lazy_static]
workspace = true

[dev-dependencies.gethostname]
workspace = true

[dev-dependencies.xtask]
path = "../../../xtask"
default-features = false
features = [
    "sandbox",
]

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]
