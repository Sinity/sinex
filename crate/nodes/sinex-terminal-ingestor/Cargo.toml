[[bin]]
name = "sinex-terminal-ingestor"
path = "src/main.rs"

[package]
name = "sinex-terminal-ingestor"

[dependencies]
notify       = { workspace = true }
glob = { workspace = true }
nix          = "0.27"
whoami       = "1.4"
libc         = "0.2"
which        = "5.0"
sysinfo      = "0.30"
async-stream = "0.3"
human-panic = "2.0"
parking_lot = { workspace = true }

[dev-dependencies]
tempfile = "3.13"

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.tokio]
workspace = true
features = [
    "full",
]

[dependencies.time]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.clap]
workspace = true
features = [
    "derive",
]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.bon]
workspace = true

[dependencies.rusqlite]
workspace = true

[dependencies.dirs]
workspace = true

[dependencies.camino]
workspace = true

[dependencies.blake3]
workspace = true

[dependencies.sqlx]
workspace = true
features = [
    "postgres",
    "runtime-tokio-rustls",
    "macros",
    "uuid",
    "time",
]

[dependencies.tokio-stream]
workspace = true
features = [
    "net",
]

[dependencies.validator]
workspace = true
features = [
    "derive",
]


[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"

[dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"

[dev-dependencies.xtask]
path = "../../../xtask"

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]

[dev-dependencies.sinex-schema]
path = "../../lib/sinex-schema"

[dev-dependencies.sinex-db]
path = "../../lib/sinex-db"

[lints]
workspace = true
