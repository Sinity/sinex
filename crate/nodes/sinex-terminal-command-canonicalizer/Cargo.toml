[package]
name = "sinex-terminal-command-canonicalizer"
version.workspace = true
edition.workspace = true
authors.workspace = true

[[bin]]
name = "sinex-terminal-command-canonicalizer"
path = "src/main.rs"

[dependencies]
camino = { workspace = true }
mimalloc = { workspace = true }
# Core dependencies
anyhow.workspace = true
thiserror.workspace = true
color-eyre.workspace = true
async-trait.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing.workspace = true
tracing-subscriber.workspace = true

# Configuration
clap = { workspace = true, features = ["derive"] }
serde.workspace = true
serde_json.workspace = true

# Time handling
chrono.workspace = true

# Database
sqlx.workspace = true

# Local dependencies
sinex-node-sdk = { path = "../../lib/sinex-node-sdk" }
sinex-processor-runtime = { path = "../../lib/sinex-processor-runtime" }
sinex-core = { path = "../../lib/sinex-core" }

[dev-dependencies]
sinex-test-utils = { path = "../../lib/sinex-test-utils" }

[features]
default = []
metrics = []
