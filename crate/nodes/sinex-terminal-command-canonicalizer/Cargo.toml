[[bin]]
name = "sinex-terminal-command-canonicalizer"
path = "src/main.rs"

[package]
name = "sinex-terminal-command-canonicalizer"

[features]
default = [
]
metrics = [
]

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[dependencies.camino]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.tokio]
workspace = true
features = [
    "full",
]

[dependencies.time]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.clap]
workspace = true
features = [
    "derive",
]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"

[dependencies.sinex-processor-runtime]
path = "../../lib/sinex-processor-runtime"


[dev-dependencies.xtask]
path = "../../../xtask"
default-features = false
features = [
    "sandbox",
]

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]
