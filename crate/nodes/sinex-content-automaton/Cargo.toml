[package]
name = "sinex-content-automaton"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[[bin]]
name = "sinex-content-automaton"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
sinex-node-sdk = { path = "../../lib/sinex-node-sdk" }
sinex-services = { path = "../../lib/sinex-services" }
sinex-core = { path = "../../lib/sinex-core" }
sinex-processor-runtime = { path = "../../lib/sinex-processor-runtime" }
sqlx = { workspace = true }
# sinex-annex folded into sinex-satellite-sdk

tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
camino = { workspace = true }
anyhow = "1.0"
color-eyre = { workspace = true }
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.0", features = ["derive"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
sinex-test-utils = { path = "../../lib/sinex-test-utils" }
