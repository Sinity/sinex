[[bin]]
name = "sinex-content-automaton"
path = "src/main.rs"

[package]
name = "sinex-content-automaton"

[dependencies]
serde_json = "1.0"
async-trait = "0.1"
tracing = "0.1"

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[package.repository]
workspace = true

[package.license]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"

[dependencies.sinex-services]
path = "../../lib/sinex-services"


[dependencies.sinex-processor-runtime]
path = "../../lib/sinex-processor-runtime"

[dependencies.sqlx]
workspace = true

[dependencies.tokio]
version = "1.0"
features = [ "full",]

[dependencies.serde]
version = "1.0"
features = [ "derive",]

[dependencies.color-eyre]
workspace = true

[dependencies.tracing-subscriber]
version = "0.3"
features = [ "env-filter",]

[dependencies.clap]
version = "4.0"
features = [ "derive",]

[dev-dependencies.xtask]
path = "../../../xtask"
default-features = false
features = [ "sandbox",]

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [ "testing",]
