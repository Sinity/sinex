[[bin]]
name = "sinex-fs-ingestor"
path = "src/main.rs"

[package]
name = "sinex-fs-ingestor"

[dependencies]
async-stream = "0.3"
human-panic = "2.0"
tokio-util   = "0.7"

[features]
default = [
]
metrics = [
]

[dev-dependencies]
tempfile = "3.8"

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[dependencies.camino]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.tokio]
workspace = true
features = [
    "full",
]

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.clap]
workspace = true
features = [
    "derive",
]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.dirs]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.tokio-stream]
workspace = true
features = [
    "net",
]

[dependencies.time]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.notify]
workspace = true

[dependencies.validator]
workspace = true

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"

[dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"

[dev-dependencies.xtask]
path = "../../../xtask"

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]

[dev-dependencies.sinex-db]
path = "../../lib/sinex-db"

[lints]
workspace = true
