[package]
name = "sinex-search-automaton"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[[bin]]
name = "sinex-search-automaton"
path = "src/main.rs"

[lib]
doctest = false

[dependencies]
camino = { workspace = true }
mimalloc = { workspace = true }
sinex-node-sdk = { path = "../../lib/sinex-node-sdk" }
sinex-processor-runtime = { path = "../../lib/sinex-processor-runtime" }
sinex-services = { path = "../../lib/sinex-services" }
sinex-core = { path = "../../lib/sinex-core" }

tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
sqlx = { workspace = true, features = ["postgres", "runtime-tokio-rustls"] }
color-eyre = { workspace = true }
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.0", features = ["derive"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
