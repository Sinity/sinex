[[bin]]
name = "sinex-system-ingestor"
path = "src/main.rs"

[package]
name  = "sinex-system-ingestor"
build = "build.rs"

[dependencies]
tokio-util   = "0.7"
futures      = "0.3"
sha2         = "0.10"
dbus         = "0.9"
dbus-tokio   = "0.7"
futures-util = "0.3"
libc         = "0.2"
human-panic = "2.0"

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[dependencies.camino]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.tokio]
workspace = true
features = [
    "full",
]

[dependencies.time]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.clap]
workspace = true
features = [
    "derive",
]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.indexmap]
workspace = true

[dependencies.bon]
workspace = true

[dependencies.tokio-retry]
workspace = true

[dependencies.dirs]
workspace = true

[dependencies.nix]
version = "0.27"
features = [
    "fs",
    "signal",
    "process",
    "user",
]

[dependencies.notify]
workspace = true

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"
features = [
    "macros",
]

[dependencies.sinex-processor-runtime]
path = "../../lib/sinex-processor-runtime"

[dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"

[dependencies.sinex-db]
path = "../../lib/sinex-db"

[dev-dependencies.xtask]
path = "../../../xtask"
default-features = false
features = [
    "sandbox",
]

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]

[lints]
workspace = true
