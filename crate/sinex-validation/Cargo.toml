[package]
name = "sinex-validation"
version = "0.1.0"
edition = "2021"

[dependencies]
thiserror = "1.0"
unicode-normalization = "0.1"
regex = "1.10"
lazy_static = "1.4"
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
siphasher = "1.0"
indexmap = { version = "2.0", features = ["serde"] }
rand = "0.8"

[dev-dependencies]
tempfile = "3.8"