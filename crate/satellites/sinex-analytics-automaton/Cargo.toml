[package]
name = "sinex-analytics-automaton"
version = "0.1.0"
edition = "2021"

[lib]
doctest = false

[dependencies]
mimalloc = { workspace = true }
sinex-satellite-sdk = { path = "../../lib/sinex-satellite-sdk" }
sinex-processor-runtime = { path = "../../lib/sinex-processor-runtime" }
sinex-services = { path = "../../lib/sinex-services" }
sinex-core = { path = "../../lib/sinex-core" }

tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
sqlx = { workspace = true, features = ["postgres", "runtime-tokio-rustls"] }
camino = { workspace = true }
color-eyre = { workspace = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
axum = "0.7"
tower = "0.5"
tower-http = { version = "0.5", features = ["cors"] }
clap = { version = "4.0", features = ["derive"] }
