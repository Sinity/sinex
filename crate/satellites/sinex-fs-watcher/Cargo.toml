[package]
name = "sinex-fs-watcher"
version.workspace = true
edition.workspace = true
authors.workspace = true

[[bin]]
name = "sinex-fs-watcher"
path = "src/main.rs"

[dependencies]
camino = { workspace = true }
mimalloc = { workspace = true }
# Core dependencies
anyhow.workspace = true
thiserror.workspace = true
async-trait.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing.workspace = true
tracing-subscriber.workspace = true

# Configuration
clap = { workspace = true, features = ["derive"] }
serde.workspace = true
serde_json.workspace = true
chrono = { workspace = true, features = ["serde"] }

# Filesystem watching
notify = "6.1"
notify-debouncer-full = "0.3"
dirs.workspace = true

# Pattern matching and path validation  
glob = "0.3"
shellexpand = "3.1"
walkdir = "2.3"
mime_guess = "2.0"

# Local dependencies
sinex-satellite-sdk = { path = "../../lib/sinex-satellite-sdk", features = ["macros"] }
sinex-types = { path = "../../lib/sinex-types", features = ["macros"] }
sinex-db = { path = "../../lib/sinex-db", features = ["telemetry"] }

[features]
default = []
metrics = []

[dev-dependencies]
sinex-test-utils = { path = "../../lib/sinex-test-utils" }
tempfile = "3.8"
