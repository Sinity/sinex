[package]
name = "sinex-pkm-automaton"
version = "0.1.0"
edition = "2021"

[dependencies]
mimalloc = { workspace = true }
sinex-satellite-sdk = { path = "../../lib/sinex-satellite-sdk" }
sinex-services = { path = "../../lib/sinex-services" }
sinex-db = { path = "../../lib/sinex-db" }
sinex-types = { path = "../../lib/sinex-types" }

tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
camino = { workspace = true }
anyhow = "1.0"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.0", features = ["derive"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
