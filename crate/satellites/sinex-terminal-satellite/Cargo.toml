[package]
name = "sinex-terminal-satellite"
version.workspace = true
edition.workspace = true
authors.workspace = true

[[bin]]
name = "sinex-terminal-satellite"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
# Core dependencies
color-eyre = { workspace = true }
thiserror.workspace = true
async-trait.workspace = true
tokio = { workspace = true, features = ["full"] }
futures = "0.3"
tracing.workspace = true
tracing-subscriber.workspace = true

# Configuration
clap = { workspace = true, features = ["derive"] }
serde.workspace = true
serde_json.workspace = true

# Filesystem monitoring
notify = "6.1"

# Database (for reading Atuin SQLite)
rusqlite.workspace = true

# Time handling
chrono.workspace = true

# System integration
dirs.workspace = true

# Path handling
camino.workspace = true

# File pattern matching
glob = "0.3"

# System dependencies
nix = "0.27"
whoami = "1.4"
libc = "0.2"
which = "5.0"
sysinfo = "0.30"

# Regex for pattern matching
regex = "1.10"

# Local dependencies
sinex-satellite-sdk = { path = "../../lib/sinex-satellite-sdk", features = ["macros"] }
sinex-core = { path = "../../lib/sinex-core", features = ["macros", "telemetry"] }

[dev-dependencies]
sinex-test-utils = { path = "../../lib/sinex-test-utils" }

[features]
default = []
metrics = []
