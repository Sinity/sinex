[package]
name = "sinex-document-ingestor"
version = "0.4.2"
edition = "2021"
description = "Unified document ingestor for all file types using source material registry"

[dependencies]
mimalloc = { workspace = true }
async-trait = "0.1"
color-eyre.workspace = true
camino = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
tracing = "0.1"
clap = { workspace = true, features = ["derive"] }

# Sinex dependencies
sinex-satellite-sdk = { path = "../../lib/sinex-satellite-sdk" }
sinex-core = { path = "../../lib/sinex-core" }

# File processing
mime_guess = "2.0"
