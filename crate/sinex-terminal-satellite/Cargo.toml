[package]
name = "sinex-terminal-satellite"
version.workspace = true
edition.workspace = true
authors.workspace = true

[[bin]]
name = "sinex-terminal-satellite"
path = "src/main.rs"

[dependencies]
# Core dependencies
anyhow.workspace = true
thiserror.workspace = true
async-trait.workspace = true
tokio = { workspace = true, features = ["full"] }
futures = "0.3"
tracing.workspace = true
tracing-subscriber.workspace = true

# Configuration
clap = { workspace = true, features = ["derive"] }
serde.workspace = true
serde_json.workspace = true

# Filesystem monitoring
notify = "6.1"

# Database (for reading Atuin SQLite)
rusqlite.workspace = true

# Time handling
chrono.workspace = true

# System integration
dirs.workspace = true

# File pattern matching
glob = "0.3"

# System dependencies
nix = "0.27"
whoami = "1.4"
libc = "0.2"

# Regex for pattern matching
regex = "1.10"

# Local dependencies
sinex-satellite-sdk = { path = "../sinex-satellite-sdk" }
sinex-core-types = { path = "../sinex-core-types" }
sinex-core-utils = { path = "../sinex-core-utils" }
sinex-events = { path = "../sinex-events" }
sinex-ulid = { path = "../sinex-ulid" }
sinex-macros = { path = "../sinex-macros" }
sinex-metrics-lib = { path = "../sinex-metrics-lib" }

[features]
default = []
metrics = []