[package]
name = "sinex-db-migration"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "sinex_db_migration"
path = "src/lib.rs"

[dependencies]
async-trait = { version = "0.1" }
sea-orm-migration = { version = "1.0", features = ["sqlx-postgres", "runtime-tokio-rustls"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
sea-query = { version = "0.30", features = ["with-uuid", "with-chrono", "with-json", "postgres-array"] }

[features]
default = []