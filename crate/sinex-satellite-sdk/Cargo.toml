[package]
name = "sinex-satellite-sdk"
version.workspace = true
edition.workspace = true
authors.workspace = true

[dependencies]
# Core dependencies
anyhow.workspace = true
thiserror.workspace = true
async-trait.workspace = true
tokio = { workspace = true, features = ["full"] }
futures = "0.3"
tracing.workspace = true
tracing-subscriber.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true

# Database
sqlx.workspace = true

# Redis for message bus
redis = { version = "0.24", features = ["tokio-comp", "streams"] }

# gRPC for communication with ingestd
tonic = "0.11"
prost = "0.12"

# Time and IDs
chrono.workspace = true
uuid.workspace = true
semver = { version = "1.0", features = ["serde"] }

# Configuration
clap = { workspace = true, features = ["derive"] }
dirs.workspace = true
toml = "0.8"
tower = "0.4"

# System
sd-notify = "0.4"
gethostname.workspace = true
parking_lot = "0.12"

# Local dependencies
sinex-core-types = { path = "../sinex-core-types" }
sinex-core-utils = { path = "../sinex-core-utils" }
sinex-core-runtime = { path = "../sinex-core-runtime" }
sinex-db = { path = "../sinex-db" }
sinex-ulid = { path = "../sinex-ulid" }
sinex-events = { path = "../sinex-events" }
sinex-macros = { path = "../sinex-macros" }
sinex-metrics-lib = { path = "../sinex-metrics-lib" }
sinex-error = { path = "../sinex-error" }
sinex-preflight = { path = "../sinex-preflight" }

[build-dependencies]
tonic-build = "0.11"
chrono = "0.4"

[features]
default = []
event-source = []
automaton = []