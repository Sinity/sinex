[package]
name = "sx"
version = "0.1.0"
edition = "2021"
description = "Sinex development orchestrator - hot reload, state continuity, and prompt-to-node workflow"
license = "MIT"

[[bin]]
name = "sx"
path = "src/main.rs"

[dependencies]
# CLI
clap = { version = "4", features = ["derive", "env"] }

# Async runtime
tokio = { version = "1", features = ["full", "signal", "process"] }

# File watching
notify = "6"
notify-debouncer-mini = "0.4"

# Process management
nix = { version = "0.27", features = ["signal", "process"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
color-eyre = "0.6"
thiserror = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Path handling
camino = "1"

# Configuration
toml = "0.8"

# HTTP client for RPC
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Time handling
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tempfile = "3"
