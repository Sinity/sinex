[package]
name = "sinexd"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

# Single local daemon hosting the event engine, JSON-RPC/SSE/native-messaging API,
# source-unit dispatch, and derived-node automata. Replaces the former four-binary
# arrangement (sinex-ingestd, sinex-gateway, sinex-source-worker, sinex-process).
# See issue #1054 for the collapse contract.
[[bin]]
name = "sinexd"
path = "src/main.rs"

[lib]
name = "sinexd"
path = "src/lib.rs"

[features]
default = []
tokio-console = ["dep:console-subscriber"]
# Enable test-only injection points (fault hooks, processing delays, delivery
# observers, DLQ-routing override) on the event_engine's JetStreamConsumer.
# Required by integration tests in this crate's tests/event_engine/ directory.
testing = []
# Expose api::handlers_test_support and api::rpc_server_test_support for tests
# that need richer scaffolding than ServiceContainer offers.
test-support = []
# Include full error details in RPC responses (development only — production
# returns error_id only to prevent information leakage).
dev-errors = []

[dependencies]
# Sinex internals
sinex-primitives = { path = "../sinex-primitives" }
sinex-db = { path = "../sinex-db" }
sinex-node-sdk = { path = "../lib/sinex-node-sdk" }

# Async runtime + allocator
tokio = { workspace = true, features = ["full"] }
tokio-stream = { workspace = true, features = ["net"] }
mimalloc = { workspace = true }
futures = { workspace = true }
parking_lot = { workspace = true }
dashmap = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
color-eyre = { workspace = true }
console-subscriber = { workspace = true, optional = true }

# Data
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
sqlx = { workspace = true }
time = { workspace = true }
async-nats = { workspace = true }
url = { workspace = true }
blake3 = { workspace = true }
crc32fast = { workspace = true }
base64 = { workspace = true }

# CLI + filesystem
clap = { workspace = true, features = ["derive"] }
camino = { workspace = true }
dirs = { workspace = true }
validator = { workspace = true }
bon = { workspace = true }
libc = { workspace = true }
notify = { workspace = true }

# HTTP / RPC / TLS (api module)
axum = { workspace = true }
tower = { version = "0.5", features = ["util", "timeout", "limit", "load-shed"] }
tower-http = { version = "0.6", features = ["cors", "limit", "request-id", "trace"] }
hyper-util = "0.1"
tokio-rustls = "0.26"
subtle = "2"
governor = { workspace = true }
petgraph = { workspace = true }
reqwest = { workspace = true }
serde_path_to_error = { workspace = true }
bytes = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
gethostname = { workspace = true }
xtask = { path = "../../xtask" }
xtask-macros = { path = "../../xtask/macros" }
sinex-primitives = { path = "../sinex-primitives", features = ["testing"] }
# Self-reference to enable the `testing` feature for integration tests in tests/.
sinexd = { path = ".", features = ["testing"] }

[lints]
workspace = true
