[package]
name = "sinexd"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true


[[bin]]
name = "sinexd"
path = "src/main.rs"

# sinex-r6d.9 VM crash-window harness: testing-feature only, never built for
# production (see the module doc on the binary itself).
