[package]
name = "sinex-sensd"
version = "0.4.2"
edition = "2021"
license = "MIT"
description = "Universal acquisition daemon for Sinex - manages source material capture and temporal ledger"

[dependencies]
# Core dependencies
sinex-core = { path = "../../lib/sinex-core" }
sinex-satellite-sdk = { path = "../../lib/sinex-satellite-sdk" }

# Async runtime
tokio = { workspace = true }
async-trait = { workspace = true }

# Database
sqlx = { workspace = true }

# Error handling
color-eyre = { workspace = true }
thiserror = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Utils
ulid = { workspace = true }
chrono = { workspace = true }
camino = { workspace = true }
bytes = "1.10"
blake3 = { workspace = true }

# File system watching
notify = { workspace = true }

# Streaming
tokio-stream = { workspace = true }
async-stream = "0.3"
tempfile = { workspace = true }

# gRPC
tonic = { workspace = true }
prost = { workspace = true }

# Configuration
figment = { workspace = true }
validator = { workspace = true }
bon = { workspace = true }

[build-dependencies]
tonic-build = { workspace = true }

[dev-dependencies]
sinex-test-utils = { path = "../../lib/sinex-test-utils" }
