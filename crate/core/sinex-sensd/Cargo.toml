[package]
name = "sinex-sensd"
version = "0.4.2"
edition = "2021"
license = "MIT"
description = "Universal acquisition daemon for Sinex - manages source material capture and temporal ledger"

[dependencies]
# Core dependencies
sinex-core = { path = "../../lib/sinex-core" }
sinex-satellite-sdk = { path = "../../lib/sinex-satellite-sdk" }

# Async runtime
tokio = { version = "1.43", features = ["full"] }
async-trait = "0.1"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono"] }

# Error handling
color-eyre = "0.6"
thiserror = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utils
ulid = "1.1"
chrono = { version = "0.4", features = ["serde"] }
camino = "1.1"
bytes = "1.9"

# File system watching
notify = { version = "7.0", features = ["serde"] }

# Streaming
tokio-stream = "0.1"

# gRPC
tonic = "0.12"

# Configuration
config = "0.14"
validator = { version = "0.18", features = ["derive"] }

[dev-dependencies]
sinex-test-utils = { path = "../../lib/sinex-test-utils" }
tempfile = "3.15"