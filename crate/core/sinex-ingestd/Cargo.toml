[[bin]]
name = "sinex-ingestd"
path = "src/main.rs"

[package]
name = "sinex-ingestd"

[dependencies]
libc = "0.2"
human-panic = "2.0"

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.tokio]
workspace = true
features = [
    "full",
]

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.time]
workspace = true

[dependencies.async-nats]
workspace = true

[dependencies.clap]
workspace = true
features = [
    "derive",
]

[dependencies.camino]
workspace = true

[dependencies.dirs]
workspace = true

[dependencies.validator]
workspace = true

[dependencies.bon]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.parking_lot]
workspace = true

[dependencies.dashmap]
workspace = true

[dependencies.tokio-stream]
workspace = true
features = [
    "net",
]

[dependencies.url]
workspace = true

[dependencies.blake3]
workspace = true

[dependencies.crc32fast]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.git2]
workspace = true

[dependencies.globset]
workspace = true

[dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"

[dependencies.sinex-schema]
path = "../../lib/sinex-schema"

[dependencies.sinex-db]
path = "../../lib/sinex-db"

[features]
tokio-console = ["dep:console-subscriber"]

[dependencies.console-subscriber]
workspace = true
optional = true

[dev-dependencies.tempfile]
workspace = true

[dev-dependencies.gethostname]
workspace = true

[dev-dependencies.xtask]
path = "../../../xtask"

[dev-dependencies.xtask-macros]
path = "../../../xtask/macros"

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]

[build-dependencies]
shadow-rs = "0.35"

[lints]
workspace = true
