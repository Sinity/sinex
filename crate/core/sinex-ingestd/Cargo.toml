[[bin]]
name = "sinex-ingestd"
path = "src/main.rs"

[package]
name = "sinex-ingestd"

[dependencies]
libc = { workspace = true }
shadow-rs = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["shadow-rs"]

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.tokio]
workspace = true
features = [
    "full",
]

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.uuid]
workspace = true

[dependencies.sqlx]
workspace = true

[dependencies.time]
workspace = true

[dependencies.async-nats]
workspace = true

[dependencies.clap]
workspace = true
features = [
    "derive",
]

[dependencies.camino]
workspace = true

[dependencies.dirs]
workspace = true

[dependencies.validator]
workspace = true

[dependencies.bon]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.parking_lot]
workspace = true

[dependencies.dashmap]
workspace = true

[dependencies.tokio-stream]
workspace = true
features = [
    "net",
]

[dependencies.url]
workspace = true

[dependencies.blake3]
workspace = true

[dependencies.crc32fast]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"

[dependencies.sinex-schema]
path = "../../lib/sinex-schema"

[dependencies.sinex-db]
path = "../../lib/sinex-db"

[features]
tokio-console = ["dep:console-subscriber"]
# Enable test-only injection points (fault hooks, processing delays, delivery
# observers, DLQ-routing override) on JetStreamConsumer. Required by integration
# tests in this crate's `tests/` directory; never enabled in production builds.
testing = []

[dependencies.console-subscriber]
workspace = true
optional = true

[dev-dependencies.tempfile]
workspace = true

[dev-dependencies.gethostname]
workspace = true

[dev-dependencies.xtask]
path = "../../../xtask"

[dev-dependencies.xtask-macros]
path = "../../../xtask/macros"

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]

# Self-reference in dev-dependencies enables the `testing` feature for integration
# tests (in `tests/`), giving them access to test-only constructors and fault-injection
# fields on JetStreamConsumer that production builds do not carry. Same pattern as
# sinex-primitives' self-reference at line 67 of its Cargo.toml.
[dev-dependencies.sinex-ingestd]
path = "."
features = [
    "testing",
]

[build-dependencies]
shadow-rs = { workspace = true }

[lints]
workspace = true
