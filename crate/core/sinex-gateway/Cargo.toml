[package]
name = "sinex-gateway"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
# Performance
mimalloc = { workspace = true }
async-nats = { workspace = true }
futures = { workspace = true }
uuid = { workspace = true }

sinex-core = { path = "../../lib/sinex-core", features = [] }
sinex-services = { path = "../../lib/sinex-services" }
# sinex-annex folded into sinex-node-sdk
# sinex-telemetry folded into sinex-core
sinex-node-sdk = { path = "../../lib/sinex-node-sdk" }
async-trait = { workspace = true }

# Database
sqlx = { workspace = true, features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"] }

# Async runtime
tokio = { workspace = true, features = ["full"] }

# Socket options for hot reload (SO_REUSEPORT)
socket2 = "0.5"

# Web framework for RPC server
axum = { workspace = true }
tower = { version = "0.5", features = ["util", "timeout", "limit", "load-shed"] }
tower-http = { version = "0.6", features = ["cors", "limit", "request-id", "trace"] }
hyper-util = { version = "0.1", features = ["tokio", "http1", "http2", "server", "service"] }

# JSON-RPC
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }

# Error handling
color-eyre = { workspace = true }

# Path handling
camino = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
once_cell = "1"
subtle = "2"
governor = { workspace = true }
dashmap = { workspace = true }
tokio-rustls = "0.25"
rustls-pemfile = "1"
notify = { workspace = true }

# CLI
clap = { workspace = true, features = ["derive"] }


# Time handling
chrono = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "http2", "rustls-tls"] }

[dev-dependencies]
tempfile = "3.10"

which = "6"
rcgen = "0.13"

# Enable test-support feature for integration tests
sinex-gateway = { path = ".", features = ["test-support"] }

[features]
default = []
test-support = []
