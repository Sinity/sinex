[package]
name = "sinex-gateway"

[dependencies]
socket2        = "0.5"
once_cell      = "1"
subtle         = "2"
tokio-rustls   = "0.25"
rustls-pemfile = "1"
shadow-rs      = "0.35"
human-panic    = "2.0"
humantime      = "2.1"
sinex-primitives = { path = "../../lib/sinex-primitives" }
sinex-db = { path = "../../lib/sinex-db" }

[dev-dependencies]
tempfile = "3.10"
which    = "6"
rcgen    = { workspace = true }

[features]
default = [
]
test-support = [
]
# Include full error details in RPC responses (for development only!)
# In production, only error_id is returned to prevent information leakage.
dev-errors = [
]

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[package.repository]
workspace = true

[package.license]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.async-nats]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.uuid]
workspace = true

features = [
]

[dependencies.time]
workspace = true

[dependencies.sinex-services]
path = "../../lib/sinex-services"

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"

[dependencies.async-trait]
workspace = true

[dependencies.sqlx]
workspace = true
features = [
    "runtime-tokio-rustls",
    "postgres",
    "uuid",
    "time",
    "json",
]

[dependencies.tokio]
workspace = true
features = [
    "full",
]

[dependencies.axum]
workspace = true

[dependencies.tower]
version = "0.5"
features = [
    "util",
    "timeout",
    "limit",
    "load-shed",
]

[dependencies.tower-http]
version = "0.6"
features = [
    "cors",
    "limit",
    "request-id",
    "trace",
]

[dependencies.hyper-util]
version = "0.1"
features = [
    "tokio",
    "http1",
    "http2",
    "server",
    "service",
]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.camino]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.governor]
workspace = true

[dependencies.dashmap]
workspace = true

[dependencies.petgraph]
workspace = true

[dependencies.notify]
workspace = true

[dependencies.clap]
workspace = true
features = [
    "derive",
]

[dependencies.reqwest]
version = "0.12"
default-features = false
features = [
    "json",
    "http2",
    "rustls-tls",
]

[dev-dependencies.sinex-gateway]
path = "."
features = [
    "test-support",
]

[dev-dependencies.xtask]
path = "../../../xtask"
default-features = false
features = [
    "sandbox",
]

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]

[build-dependencies]
shadow-rs = "0.35"

[lints]
workspace = true
