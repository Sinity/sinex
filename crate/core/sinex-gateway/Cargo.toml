[package]
name = "sinex-gateway"

[dependencies]
socket2        = "0.5"
subtle         = "2"
tokio-rustls   = "0.26"
human-panic    = { workspace = true }
shadow-rs      = { workspace = true }
sinex-primitives = { path = "../../lib/sinex-primitives", features = ["nats"] }
sinex-db = { path = "../../lib/sinex-db" }

[package.metadata.cargo-machete]
ignored = ["shadow-rs"]

[dev-dependencies]
tempfile = { workspace = true }
which    = { workspace = true }
rcgen    = { workspace = true }
bytes    = "1.5"
uuid     = { workspace = true }

[features]
default = []
test-support = []
# Include full error details in RPC responses (for development only!)
# In production, only error_id is returned to prevent information leakage.
dev-errors = []
tokio-console = ["dep:console-subscriber"]

[dependencies.console-subscriber]
workspace = true
optional = true

[package.version]
workspace = true

[package.edition]
workspace = true

[package.authors]
workspace = true

[package.repository]
workspace = true

[package.license]
workspace = true

[dependencies.mimalloc]
workspace = true

[dependencies.async-nats]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.uuid]
workspace = true

features = [
]

[dependencies.time]
workspace = true

[dependencies.sinex-node-sdk]
path = "../../lib/sinex-node-sdk"


[dependencies.sqlx]
workspace = true
features = [
    "runtime-tokio-rustls",
    "postgres",
    "uuid",
    "time",
    "json",
]

[dependencies.tokio]
workspace = true
features = [
    "full",
]

[dependencies.axum]
workspace = true

[dependencies.tower]
version = "0.5"
features = [
    "util",
    "timeout",
    "limit",
    "load-shed",
]

[dependencies.tower-http]
version = "0.6"
features = [
    "cors",
    "limit",
    "request-id",
    "trace",
]

[dependencies.hyper-util]
version = "0.1"
features = [
    "tokio",
    "http1",
    "http2",
    "server",
    "service",
]

[dependencies.serde]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.serde_path_to_error]
workspace = true

[dependencies.base64]
workspace = true

[dependencies.color-eyre]
workspace = true

[dependencies.camino]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.governor]
workspace = true

[dependencies.dashmap]
workspace = true

[dependencies.parking_lot]
workspace = true

[dependencies.blake3]
workspace = true

[dependencies.tokio-stream]
workspace = true

[dependencies.petgraph]
workspace = true

[dependencies.notify]
workspace = true

[dependencies.clap]
workspace = true
features = [
    "derive",
]

[dependencies.reqwest]
workspace = true
features = [
    "json",
    "http2",
    "rustls-tls",
    "stream",
]

[dev-dependencies.sinex-gateway]
path = "."
features = [
    "test-support",
]

[dev-dependencies.xtask]
path = "../../../xtask"

[dev-dependencies.sinex-primitives]
path = "../../lib/sinex-primitives"
features = [
    "testing",
]

[dev-dependencies.sinex-schema]
path = "../../lib/sinex-schema"

[build-dependencies]
shadow-rs = { workspace = true }

[lints]
workspace = true
