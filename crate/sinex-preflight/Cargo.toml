[package]
name = "sinex-preflight"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "sinex-preflight"
path = "src/main.rs"

[dependencies]
# Core dependencies
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
clap = { version = "4.0", features = ["derive"] }

# Database
sqlx = { version = "0.7", features = ["postgres", "runtime-tokio-rustls", "migrate", "uuid", "chrono", "json"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# System info
sysinfo = "0.31"
nix = { version = "0.28", features = ["fs", "resource"] }
gethostname = "0.5"

# URL parsing for database URL redaction
url = "2.5"

# TOML parsing for configuration validation
toml = "0.8"

# Path dependencies
sinex-core = { path = "../sinex-core" }
sinex-db = { path = "../sinex-db" }
sinex-ulid = { path = "../sinex-ulid" }

[dev-dependencies]
tempfile = "3.0"