[package]
name = "sinex-service-base"
version.workspace = true
edition.workspace = true
authors.workspace = true

[dependencies]
# Core async runtime
tokio = { workspace = true }
async-trait = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Time handling
chrono = { workspace = true }

# Configuration
toml = { workspace = true }
url = { workspace = true }

# System utilities
gethostname = { workspace = true }

# Logging and tracing
tracing = { workspace = true }

# IDs
sinex-ulid = { path = "../sinex-ulid" }

# Local validation
sinex-validation = { path = "../sinex-validation" }

[features]
default = []
sd-notify = []  # Systemd notify support